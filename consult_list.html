<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>상담도우미 - 상담 진행 리스트</title>
<style>
:root{
  --blue:#0b4ea2;
  --blue2:#1565d8;
  --bg:#f3f7fc;
  --card:#fff;
  --ink:#111827;
  --muted:#64748b;
  --line:#e5e7eb;
  --red:#ef4444;
  --orange:#f97316;
  --yellow:#eab308;
  --green:#22c55e;
  --violet:#7c3aed;
  --shadow:0 18px 50px rgba(15,23,42,.18)
}

*{box-sizing:border-box}

body{
  margin:0;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:linear-gradient(135deg,#eaf3ff,#fbfdff);
  color:var(--ink)
}

button,input,select,textarea{font:inherit}

.wrap{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  padding:20px 10px
}

.phone{
  width:min(430px,100%);
  height:900px;
  background:#111;
  border-radius:42px;
  padding:12px;
  box-shadow:var(--shadow)
}

.screen{
  height:100%;
  border-radius:32px;
  background:var(--bg);
  overflow:hidden;
  position:relative
}

.top{
  height:92px;
  background:linear-gradient(135deg,#073b86,#0d63ce);
  color:#fff;
  padding:12px 18px 10px;
  position:relative
}

.pill{
  position:absolute;
  left:50%;
  top:12px;
  transform:translateX(-50%);
  width:116px;
  height:27px;
  background:#06152c;
  border-radius:999px
}

.status{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  font-weight:800;
  margin-bottom:9px
}

.brand{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px
}

.brandLeft{
  display:flex;
  align-items:center;
  gap:12px
}

.shield{
  width:42px;
  height:42px;
  border-radius:15px;
  background:linear-gradient(145deg,#dff6ff,#60a5fa);
  display:grid;
  place-items:center;
  font-size:24px
}

.brand h1{margin:0;font-size:18px}
.brand p{margin:3px 0 0;font-size:12px;opacity:.85}

.loginBtn{
  flex:0 0 auto;
  display:flex;
  align-items:center;
  gap:6px;
  background:rgba(255,255,255,.16);
  border:1px solid rgba(255,255,255,.55);
  color:#fff;
  font-size:14px;
  font-weight:900;
  padding:8px 13px;
  border-radius:999px;
  cursor:pointer;
  white-space:nowrap;
  backdrop-filter:blur(2px);
  transition:background .15s ease
}

#loginIcon{font-size:18px;line-height:1}
.loginBtn:active{transform:translateY(1px)}
.loginBtn:hover{background:rgba(255,255,255,.28)}
.loginBtn.isAdmin{background:var(--green);color:#fff;border-color:var(--green)}

.content{
  height:calc(100% - 92px - 84px);
  overflow:auto;
  padding:12px 16px 16px;
  scrollbar-width:none
}

.title{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:4px 0 9px;
  font-weight:950;
  font-size:15px
}

.title small{color:var(--muted);font-weight:800;font-size:12px}

.card,.form{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 8px 19px rgba(15,23,42,.06);
  padding:12px;
  margin:9px 0
}

.card h4{margin:0 0 8px;font-size:14px}
.card p{font-size:13px;color:#475569;line-height:1.55;margin:5px 0}

.row{margin-bottom:8px}

.row label{
  display:block;
  font-size:12px;
  font-weight:950;
  color:#334155;
  margin-bottom:5px
}

.row input,.row select,.row textarea{
  width:100%;
  border:1px solid #dbe4f0;
  border-radius:12px;
  padding:11px;
  background:#fff;
  font-size:13px
}

.rangeRow{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  gap:6px;
  align-items:center
}

.rangeRow .dash{
  text-align:center;
  color:var(--muted);
  font-weight:800;
  font-size:13px
}

.btnGroup{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:8px;
  margin-top:10px
}

.btn{
  width:100%;
  border:0;
  border-radius:14px;
  background:#1565d8;
  color:#fff;
  font-weight:950;
  padding:12px;
  cursor:pointer;
  text-align:center;
  text-decoration:none;
  display:block;
  font-size:13px
}

.btn.gray{background:#f1f5f9;color:#0f172a;border:1px solid #dbe4f0}

.resultSummary{
  display:flex;
  align-items:center;
  justify-content:space-between;
  margin:14px 0 8px;
  font-size:12px;
  color:var(--muted);
  font-weight:850
}

.resultSummary strong{color:var(--blue);font-size:14px}

.clientCard{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  box-shadow:0 8px 19px rgba(15,23,42,.06);
  padding:13px 14px;
  margin:9px 0;
  cursor:pointer;
  transition:box-shadow .15s ease, transform .15s ease
}

.clientCard:active{transform:translateY(1px)}

.clientCardTop{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:8px;
  margin-bottom:8px
}

.clientNameWrap{
  display:flex;
  align-items:baseline;
  gap:7px
}

.clientNameWrap b{font-size:15px;font-weight:950}

.genderAge{
  font-size:11px;
  color:var(--muted);
  font-weight:800
}

.clientPhone{
  font-size:12px;
  color:#1d4ed8;
  font-weight:850
}

.chips{display:flex;gap:5px;flex-wrap:wrap;margin:6px 0 9px}

.chip{
  font-size:11px;
  font-weight:850;
  padding:5px 8px;
  border-radius:999px;
  background:#eff6ff;
  color:#1d4ed8
}

.chip.topic{background:#f5f3ff;color:#6d28d9}

.meta{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:6px
}

.meta div{
  background:#f8fafc;
  border-radius:10px;
  padding:7px
}

.meta b{
  display:block;
  color:#475569;
  font-size:11px;
  margin-bottom:2px;
  font-weight:900
}

.meta span{font-size:12px;font-weight:700}

.emptyCard{
  background:#fff;
  border:1px dashed #cbd5e1;
  border-radius:18px;
  padding:38px 16px;
  text-align:center;
  color:var(--muted);
  font-size:13px;
  font-weight:800;
  margin:9px 0
}

.tabs{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:84px;
  background:#fff;
  border-top:1px solid #e5e7eb;
  display:grid;
  grid-template-columns:repeat(5,1fr);
  padding:8px
}

.tab{
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2px;
  color:#64748b;
  font-size:11px;
  font-weight:850;
  cursor:pointer;
  text-decoration:none;
  position:relative
}

.tab.active{color:#0b4ea2}

.plus{
  margin-top:-25px;
  width:58px;
  height:58px;
  border-radius:50%;
  background:#0b4ea2;
  color:#fff;
  border:5px solid #fff;
  display:grid;
  place-items:center;
  font-size:35px
}

/* ===== 상세 모달 ===== */
.modalOverlay{
  position:fixed;
  inset:0;
  background:rgba(15,23,42,.55);
  display:none;
  align-items:flex-end;
  justify-content:center;
  z-index:999;
  padding:0
}

.modalOverlay.open{display:flex}

.detailModal{
  width:100%;
  max-width:430px;
  max-height:82vh;
  background:#fff;
  border-radius:24px 24px 0 0;
  padding:20px 18px 22px;
  box-shadow:0 -12px 40px rgba(15,23,42,.35);
  position:relative;
  overflow-y:auto
}

.detailModal h3{
  margin:0 0 2px;
  font-size:17px;
  color:var(--blue)
}

.detailModal p.sub{
  margin:0 0 14px;
  font-size:12px;
  color:var(--muted)
}

.modalClose{
  position:absolute;
  right:14px;
  top:14px;
  width:28px;
  height:28px;
  border:0;
  background:#f1f5f9;
  border-radius:50%;
  color:#475569;
  font-size:15px;
  cursor:pointer
}

.detailModal .meta{margin-top:6px}

.detailModal .noteBox{
  background:#fff8e1;
  border:1px solid #fde68a;
  border-radius:14px;
  padding:9px 11px;
  font-size:12px;
  line-height:1.55;
  color:#713f12;
  margin-top:10px
}

.detailModal .btn{margin-top:14px}
</style>
</head>
<body>
<div class="wrap">
<main class="phone">
<div class="screen">

<header class="top">
  <div class="pill"></div>
  <div class="status">
    <span>9:41</span>
    <span>●●● 5G 🔋</span>
  </div>
  <div class="brand">
    <div class="brandLeft">
      <div class="shield">👤</div>
      <div>
        <h1>상담 진행 리스트</h1>

<!-- 상세 정보 모달 -->
<div class="modalOverlay" id="detailModalOverlay">
  <div class="detailModal">
    <button class="modalClose" type="button" onclick="closeDetailModal()">✕</button>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
// ===== Supabase 연결 설정 (Consultation_registration.html과 동일한 값 재사용) =====
const SUPABASE_URL = "https://fafdxaifluftnertbpvr.supabase.co";
const SUPABASE_ANON_KEY = "sb_publishable_RNEAVQD2wZRtZojxVU11aA_Dacmf7db";
const TABLE_NAME = "db_sina_counsel";
let sb = null;
try {
  if (!window.supabase) throw new Error("Supabase 라이브러리를 불러오지 못했습니다.");
  sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    auth: {
      storage: window.sessionStorage,
      persistSession: true,
      autoRefreshToken: true
    }
  });
} catch (err) {
  console.error("Supabase 초기화 실패:", err);
}

let currentSession = null;
function isLoggedIn() { return !!currentSession; }

// ===== 로그인 버튼 (index.html과 동일 패턴, 이 화면은 조회 전용이라 별도 모달 없이 상태만 표시) =====
const loginTrigger = document.getElementById('loginTrigger');
const loginIcon = document.getElementById('loginIcon');
const loginLabel = document.getElementById('loginLabel');

function openLoginModal(){
  // 로그인 화면은 index.html에서 처리, 여기서는 메인으로 이동만 안내
  if (!isLoggedIn()) {
    alert('로그인은 메인화면에서 진행해주세요.');
    window.location.href = 'index.html';
  } else {
    if (confirm('로그아웃 하시겠습니까?')) {
      sb && sb.auth.signOut();
      currentSession = null;
      updateLoginButton();
    }
  }
}

function updateLoginButton(){
  if (isLoggedIn()) {
    loginTrigger.classList.add('isAdmin');
    loginIcon.textContent = '🔓';
    loginLabel.textContent = '관리자';
  } else {
    loginTrigger.classList.remove('isAdmin');
    loginIcon.textContent = '🔒';
    loginLabel.textContent = '로그인';
  }
}

// ===== 코드 → 한글명 매핑 테이블 (lookup 테이블에서 로드) =====
const codeMaps = {
  sex: {},
  job: {},
  target: {},   // counsel_client_type
  topic: {}     // counsel_topic
};

async function loadCodeMaps(){
  if (!sb) return;
  try {
    const [sexRes, jobRes, targetRes, topicRes] = await Promise.all([
      sb.from('sex_codes').select('code,name'),
      sb.from('job_codes').select('code,name'),
      sb.from('counsel_client_type').select('code,name'),
      sb.from('counsel_topic').select('code,name')
    ]);
    (sexRes.data || []).forEach(r => codeMaps.sex[r.code] = r.name);
    (jobRes.data || []).forEach(r => codeMaps.job[r.code] = r.name);
    (targetRes.data || []).forEach(r => codeMaps.target[r.code] = r.name);
    (topicRes.data || []).forEach(r => codeMaps.topic[r.code] = r.name);
  } catch (err) {
    console.error('코드 매핑 로드 실패:', err);
  }
}

function labelSex(code){ return codeMaps.sex[code] || code || '-'; }
function labelJob(code){ return codeMaps.job[code] || code || '-'; }
function labelTarget(code){ return codeMaps.target[code] || code || '-'; }
function labelTopic(code){ return codeMaps.topic[code] || code || '-'; }

// ===== 로그인 가드: 비로그인 상태면 메인화면으로 이동 (조회/저장과 동일) =====
async function guardLoginOrRedirect(){
  if (!sb) return false;
  const { data } = await sb.auth.getSession();
  currentSession = data.session;
  if (!currentSession) {
    alert('로그인이 필요한 화면입니다. 메인화면으로 이동합니다.');
    window.location.href = 'index.html';
    return false;
  }
  return true;
}

async function initAuth(){
  if (!sb) { updateLoginButton(); return; }
  const ok = await guardLoginOrRedirect();
  updateLoginButton();
  if (!ok) return;

  await loadCodeMaps();

  sb.auth.onAuthStateChange((_event, session) => {
    currentSession = session;
    updateLoginButton();
    if (!session) {
      alert('로그인이 종료되어 메인화면으로 이동합니다.');
      window.location.href = 'index.html';
    }
  });
}
initAuth();

// ===== 검색 =====
const startDate = document.getElementById("startDate");
const endDate = document.getElementById("endDate");
const clientName = document.getElementById("clientName");
const phoneNumber = document.getElementById("phoneNumber");
const resetButton = document.getElementById("resetButton");
const searchButton = document.getElementById("searchButton");
const consultListBody = document.getElementById("consultListBody");
const emptyState = document.getElementById("emptyState");
const resultCount = document.getElementById("resultCount");

resetButton.addEventListener("click", () => {
  startDate.value = "";
  endDate.value = "";
  clientName.value = "";
  phoneNumber.value = "";
  renderList([]);
});

searchButton.addEventListener("click", async () => {
  const ok = await guardLoginOrRedirect();
  if (!ok) return;

  if (!sb) {
    alert('데이터베이스 연결에 실패했습니다. 인터넷 연결을 확인해주세요.');
    return;
  }

  searchButton.disabled = true;
  const originalLabel = searchButton.textContent;
  searchButton.textContent = '조회 중...';

  try {
    // 기간/이름/전화번호는 개별 또는 조합(AND)으로 적용됩니다.
    // 기간 필터는 실제 상담이 진행된 날짜인 appointment_at 기준입니다.
    let query = sb.from(TABLE_NAME).select('*');

    if (clientName.value.trim()) {
      query = query.ilike('client_name', `%${clientName.value.trim()}%`);
    }
    if (phoneNumber.value.trim()) {
      query = query.ilike('client_phone', `%${phoneNumber.value.trim()}%`);
    }
    if (startDate.value) {
      query = query.gte('appointment_at', `${startDate.value}T00:00:00`);
    }
    if (endDate.value) {
      query = query.lte('appointment_at', `${endDate.value}T23:59:59`);
    }

    query = query.order('appointment_at', { ascending: false });

    const { data, error } = await query;

    if (error) {
      console.error('조회 실패:', error);
      alert('조회 중 오류가 발생했습니다: ' + error.message);
      renderList([]);
      return;
    }

    renderList(data || []);
  } finally {
    searchButton.disabled = false;
    searchButton.textContent = originalLabel;
  }
});

function calcAge(birthDateStr){
  if (!birthDateStr) return '-';
  const b = new Date(birthDateStr);
  const t = new Date();
  let age = t.getFullYear() - b.getFullYear();
  const m = t.getMonth() - b.getMonth();
  if (m < 0 || (m === 0 && t.getDate() < b.getDate())) age--;
  return age;
}

function renderList(records){
  consultListBody.innerHTML = '';
  resultCount.textContent = records.length;

  if (!records.length) {
    const empty = document.createElement('div');
    empty.className = 'emptyCard';
    empty.textContent = '등록된 상담 진행 내역이 없습니다.';
    consultListBody.appendChild(empty);
    return;
  }

  records.forEach((r) => {
    const card = document.createElement('div');
    card.className = 'clientCard';
    card.innerHTML = `
      <div class="clientCardTop">
        <div class="clientNameWrap">
          <b>${r.client_name || '-'}</b>
          <span class="genderAge">${labelSex(r.sex_code)} · ${calcAge(r.Birth_date)}세</span>
        </div>
        <span class="clientPhone">${r.client_phone || '-'}</span>
      </div>
      <div class="chips">
        <span class="chip">${labelTarget(r.counsel_client_type)}</span>
        <span class="chip topic">${labelTopic(r.counsel_topic)}</span>
      </div>
      <div class="meta">
        <div><b>직업</b><span>${labelJob(r.client_job)}</span></div>
        <div><b>회기</b><span>${r.Counseling_session || '-'}회기</span></div>
        <div><b>상담일</b><span>${r.appointment_at ? r.appointment_at.slice(0,10) : '-'}</span></div>
        <div><b>상담시간</b><span>${formatTimeRange(r.Consultation_start_time, r.Consultation_end_time)}</span></div>
      </div>
    `;
    card.addEventListener('click', () => openDetailModal(r));
    consultListBody.appendChild(card);
  });
}

function formatTimeRange(start, end){
  const toHM = (v) => {
    if (!v) return null;
    const d = new Date(v);
    if (isNaN(d.getTime())) return null;
    return d.toTimeString().slice(0,5);
  };
  const s = toHM(start);
  const e = toHM(end);
  if (!s && !e) return '-';
  return `${s || '-'}~${e || '-'}`;
}

// ===== 상세 모달 =====
const detailOverlay = document.getElementById('detailModalOverlay');
const detailName = document.getElementById('detailName');
const detailSubInfo = document.getElementById('detailSubInfo');
const detailChips = document.getElementById('detailChips');
const detailMeta = document.getElementById('detailMeta');
const detailNote = document.getElementById('detailNote');

function openDetailModal(r){
  detailName.textContent = r.client_name || '-';
  detailSubInfo.textContent = `${labelSex(r.sex_code)} · ${calcAge(r.Birth_date)}세 · ${r.client_phone || '-'}`;
  detailChips.innerHTML = `
    <span class="chip">${labelTarget(r.counsel_client_type)}</span>
    <span class="chip topic">${labelTopic(r.counsel_topic)}</span>
  `;
  detailMeta.innerHTML = `
    <div><b>주소</b><span>${r.client_address || '-'}</span></div>
    <div><b>회기</b><span>${r.Counseling_session || '-'}회기</span></div>
    <div><b>실시 시작</b><span>${r.Consultation_start_time ? new Date(r.Consultation_start_time).toLocaleString('ko-KR') : '-'}</span></div>
    <div><b>실시 종료</b><span>${r.Consultation_end_time ? new Date(r.Consultation_end_time).toLocaleString('ko-KR') : '-'}</span></div>
    <div><b>검사도구1</b><span>${r.Inspection_tool1 || '-'}</span></div>
    <div><b>검사도구2</b><span>${r.Inspection_tool2 || '-'}</span></div>
    <div><b>검사도구3</b><span>${r.Inspection_tool3 || '-'}</span></div>
    <div><b>검사도구4</b><span>${r.Inspection_tool4 || '-'}</span></div>
  `;
  detailNote.textContent = r.Details_of_consultation || '상세 상담내용이 없습니다.';
  // TODO: 다음 단계에서 이 버튼을 consultation_edit_save.html?id=${r.id} 로 바로 이동하도록 연동 예정
  detailOverlay.classList.add('open');
}

function closeDetailModal(){
  detailOverlay.classList.remove('open');
}

detailOverlay.addEventListener('click', (e) => {
  if (e.target === detailOverlay) closeDetailModal();
});
</script>
</body>
</html>
