<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 등록</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #f4f5f7;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    color: #222;
  }
  .container {
    max-width: 920px;
    margin: 0 auto;
    background: #ffffff;
    border: 1px solid #e0e2e7;
    border-radius: 10px;
    padding: 32px 40px 40px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 12px;
    color: #14171f;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 i { font-size: 26px; color: #1a56db; }
  .section {
    border: 1px solid #e0e2e7;
    border-radius: 8px;
    padding: 20px 24px 24px;
    margin-bottom: 20px;
  }
  .section h2 {
    font-size: 21px;
    font-weight: 700;
    color: #1a56db;
    margin: 0 0 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section h2 i { font-size: 21px; }
  .sectionHeadRow{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:18px;
  }
  .sectionHeadRow h2{ margin:0; }
  .lookupBtn{
    display:inline-flex;
    align-items:center;
    gap:6px;
    background:#eef2ff;
    border:1px solid #c7d2fe;
    color:#3730a3;
    font-size:14px;
    font-weight:800;
    padding:8px 12px;
    border-radius:8px;
    cursor:pointer;
  }
  .lookupBtn:hover{ background:#e0e7ff; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px 24px;
  }
  .grid.cols-3 { grid-template-columns: repeat(3, 1fr); }
  .grid.cols-4 { grid-template-columns: repeat(4, 1fr); }
  .grid.session-row {
    grid-template-columns: 0.7fr 1.3fr 1.3fr 1.3fr 0.7fr;
  }
  .grid.next-session-row {
    grid-template-columns: 0.7fr 1.3fr;
    max-width: 480px;
  }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 17px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 6px;
  }
  input[type="text"],
  input[type="date"],
  select,
  textarea {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 18px;
    font-weight: 600;
    color: #111827;
    background: #ffffff;
    font-family: inherit;
  }
  select { cursor: pointer; }
  input[readonly] {
    background: #f3f4f6;
    color: #6b7280;
    cursor: not-allowed;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1a56db;
    box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
  }
  textarea {
    height: 110px;
    padding: 10px 12px;
    resize: vertical;
    line-height: 1.5;
  }
  .char-count {
    text-align: right;
    font-size: 16px;
    font-weight: 600;
    color: #9ca3af;
    margin-top: 4px;
  }
  .test-tools-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .test-tools-row select { font-size: 17px; }
  .dtRow{
    display:flex;
    gap:6px;
  }
  .dtRow input[type="date"]{ flex:1.2; font-size:15px; }
  .dtRow select{ flex:1; font-size:15px; padding:0 6px; }
  .dtPreview{
    font-size:13px;
    font-weight:700;
    color:#1a56db;
    background:#eef4ff;
    border:1px solid #d7e6ff;
    border-radius:6px;
    padding:5px 8px;
    margin-top:5px;
  }
  .field.invalid input, .field.invalid select{
    border-color:#dc2626 !important;
    box-shadow:0 0 0 3px rgba(220,38,38,.10);
  }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    height: 46px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #374151;
    font-size: 18px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
  }
  .btn:hover { background: #f9fafb; }
  .btn:disabled { opacity:.6; cursor:not-allowed; }
  .btn.primary {
    background: #1a56db;
    border-color: #1a56db;
    color: #ffffff;
  }
  .btn.primary:hover { background: #1747b8; }
  .statusMsg{
    display:none;
    border-radius:8px;
    padding:10px 14px;
    font-size:15px;
    font-weight:700;
    margin-bottom:16px;
  }
  .statusMsg.show{ display:block; }
  .statusMsg.success{ background:#ecfdf3; border:1px solid #bbf7d0; color:#16a34a; }
  .statusMsg.error{ background:#fef2f2; border:1px solid #fecaca; color:#dc2626; }

  /* 접수상담조회 팝업 */
  .lookupOverlay{
    position:fixed; inset:0;
    background:rgba(15,23,42,.55);
    display:none; align-items:center; justify-content:center;
    z-index:999; padding:20px;
  }
  .lookupOverlay.open{ display:flex; }
  .lookupModal{
    width:100%; max-width:480px;
    max-height:80vh;
    overflow-y:auto;
    background:#fff;
    border-radius:14px;
    padding:22px 22px 20px;
    box-shadow:0 24px 60px rgba(15,23,42,.35);
    position:relative;
  }
  .lookupModal h3{ margin:0 0 4px; font-size:19px; color:#1a56db; }
  .lookupModal p.sub{ margin:0 0 16px; font-size:13px; color:#6b7280; }
  .lookupClose{
    position:absolute; right:14px; top:14px;
    width:28px; height:28px; border:0;
    background:#f1f5f9; border-radius:50%;
    color:#475569; font-size:15px; cursor:pointer;
  }
  .lookupRow{
    display:flex; justify-content:space-between;
    font-size:14px; padding:7px 0;
    border-bottom:1px solid #f1f5f9;
  }
  .lookupRow b{ color:#374151; font-weight:800; }
  .lookupRow span{ color:#111827; text-align:right; max-width:60%; }
  .lookupEmpty{ font-size:14px; color:#6b7280; padding:14px 0; text-align:center; }

  /* =========================================================
     모바일 · 테블릿 최적화 (1024px 이하)
     - 상단 "상담 등록" 제목(h1)을 제외한 모든 문자 크기 30% 축소
     - 고정 5열(session-row) / 2열(next-session-row) 등 모든 표 형태 그리드를 1열로 자동 변환
     - 입력창 · 버튼 크기도 비례 축소
     ========================================================= */
  @media (max-width: 1024px) {
    body { padding: 16px 10px; }
    .container { padding: 20px 16px 24px; }

    /* 1) 모든 그리드 행 1열 자동 변환 */
    .grid,
    .grid.cols-3,
    .grid.cols-4,
    .grid.session-row,
    .grid.next-session-row,
    .test-tools-row {
      grid-template-columns: 1fr;
    }
    .grid.next-session-row { max-width: 100%; }
    .grid { gap: 12px 14px; }
    .section { padding: 14px 16px 16px; }

    /* 2) 문자 크기 30% 축소 (h1 "상담 등록" 제외) */
    .section h2 { font-size: 15px; }            /* 21px -> 15px */
    .section h2 i { font-size: 15px; }
    label { font-size: 12px; }                  /* 17px -> 12px */
    input[type="text"],
    input[type="date"],
    select,
    textarea { font-size: 13px; }                /* 18px -> 13px */
    .char-count { font-size: 11px; }             /* 16px -> 11px */
    .test-tools-row select { font-size: 12px; }  /* 17px -> 12px */
    .dtRow input[type="date"],
    .dtRow select { font-size: 11px; }           /* 15px -> 11px */
    .dtPreview { font-size: 9px; }                /* 13px -> 9px */
    .statusMsg { font-size: 11px; }              /* 15px -> 11px */
    .lookupBtn { font-size: 10px; }              /* 14px -> 10px */
    .lookupModal h3 { font-size: 13px; }         /* 19px -> 13px */
    .lookupModal p.sub { font-size: 9px; }       /* 13px -> 9px */
    .lookupRow { font-size: 10px; }              /* 14px -> 10px */

    /* 3) 입력창 · 버튼 크기 축소 (약 30%) */
    input[type="text"],
    input[type="date"],
    select { height: 28px; }                     /* 40px -> 28px */
    .btn { height: 32px; font-size: 13px; }      /* 46px -> 32px, 18px -> 13px */
    .lookupBtn { padding: 6px 8px; }             /* 8px 12px -> 6px 8px */

    .actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><i class="ti ti-clipboard-heart" aria-hidden="true"></i>상담 등록</h1>

  <div class="statusMsg" id="statusMsg"></div>

  <form id="intakeForm">

    <!-- 1. 내담자 정보 -->
    <div class="section">
      <div class="sectionHeadRow">
        <h2><i class="ti ti-user" aria-hidden="true"></i>1. 내담자 정보</h2>
        <button type="button" class="lookupBtn" id="lookupBtn"><i class="ti ti-search" aria-hidden="true"></i>접수상담조회</button>
      </div>
      <div class="grid">
        <div class="field">
          <label for="clientName">내담자명</label>
          <input type="text" id="clientName" placeholder="내담자명을 입력하세요">
        </div>
        <div class="field">
          <label for="clientPhone">연락처</label>
          <input type="text" id="clientPhone" placeholder="010-0000-0000" maxlength="13" inputmode="numeric">
        </div>
        <div class="field">
          <label for="job">직업</label>
          <select id="job">
            <option selected disabled value="">직업 선택</option>
            <option value="office">회사원</option>
            <option value="student">학생</option>
            <option value="self">자영업</option>
          </select>
        </div>
        <div class="field">
          <label for="gender">성별</label>
          <select id="gender">
            <option selected disabled value="">성별 선택</option>
            <option value="M">남</option>
            <option value="F">여</option>
          </select>
        </div>
        <div class="field">
          <label for="birthDate">생년월일</label>
          <input type="text" id="birthDate" placeholder="YYYY-MM-DD" maxlength="10" inputmode="numeric">
        </div>
        <div class="field">
          <label for="age">나이</label>
          <input type="text" id="age" placeholder="자동 계산" readonly>
        </div>
        <div class="field full">
          <label for="address">주소</label>
          <input type="text" id="address" placeholder="주소를 입력하세요">
        </div>
      </div>
    </div>

    <!-- 2. 예약 및 진행 정보 -->
    <div class="section">
      <h2><i class="ti ti-calendar-time" aria-hidden="true"></i>2. 예약 및 진행 정보</h2>
      <div class="grid session-row">
        <div class="field">
          <label for="sessionNo">금회 회기</label>
          <select id="sessionNo">
            <option value="">선택</option>
            <option value="1">1회기</option>
            <option value="2">2회기</option>
            <option value="3">3회기</option>
          </select>
        </div>
        <div class="field" id="reservationField">
          <label>예약일</label>
          <div class="dtRow">
            <input type="date" id="reservationDate">
            <select id="reservationTime"><option value="" selected disabled>시간</option></select>
          </div>
          <div class="dtPreview" id="reservationPreview">-</div>
        </div>
        <div class="field" id="startField">
          <label>실시일 시작</label>
          <div class="dtRow">
            <input type="date" id="startDate">
            <select id="startTime"><option value="" selected disabled>시간</option></select>
          </div>
          <div class="dtPreview" id="startPreview">-</div>
        </div>
        <div class="field" id="endField">
          <label>실시일 종료</label>
          <div class="dtRow">
            <input type="date" id="endDate">
            <select id="endTime"><option value="" selected disabled>시간</option></select>
          </div>
          <div class="dtPreview" id="endPreview">-</div>
        </div>
        <div class="field">
          <label for="duration">상담시간</label>
          <input type="text" id="duration" placeholder="자동" readonly>
        </div>
      </div>

      <div class="field full" style="margin-top:16px;">
        <label>검사도구</label>
        <div class="test-tools-row">
          <select id="testTool1">
            <option value="">검사도구1</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
          </select>
          <select id="testTool2">
            <option value="">검사도구2</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
          </select>
          <select id="testTool3">
            <option value="">검사도구3</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
          </select>
          <select id="testTool4">
            <option value="">검사도구4</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
          </select>
        </div>
      </div>

      <div class="grid next-session-row" style="margin-top:16px;">
        <div class="field">
          <label for="nextSessionNo">차기 회기</label>
          <select id="nextSessionNo">
            <option value="">선택</option>
            <option value="1">1회기</option>
            <option value="2">2회기</option>
          </select>
        </div>
        <div class="field" id="nextResField">
          <label>차기 예약일</label>
          <div class="dtRow">
            <input type="date" id="nextReservationDate">
            <select id="nextReservationTime"><option value="" selected disabled>시간</option></select>
          </div>
          <div class="dtPreview" id="nextReservationPreview">-</div>
        </div>
      </div>
    </div>

    <!-- 3. 상담내용 -->
    <div class="section">
      <h2><i class="ti ti-notes" aria-hidden="true"></i>3. 상담내용</h2>
      <div class="grid">
        <div class="field">
          <label for="consultationTarget">상담대상</label>
          <select id="consultationTarget">
            <option selected disabled value="">상담대상 선택</option>
            <option value="individual">개인</option>
            <option value="family">가족</option>
          </select>
        </div>
        <div class="field">
          <label for="consultationTopic">상담주제</label>
          <select id="consultationTopic">
            <option selected disabled value="">상담주제 선택</option>
            <option value="stress">스트레스</option>
            <option value="anxiety">불안</option>
          </select>
        </div>
        <div class="field full">
          <label for="counselDetail">상세 상담내용</label>
          <textarea id="counselDetail" maxlength="1000" placeholder="상담에 대해 자세히 작성해주세요."></textarea>
          <div class="char-count"><span id="charCount">0</span> / 1000</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn primary" id="submitBtn"><i class="ti ti-device-floppy" aria-hidden="true"></i>등록</button>
      <button type="reset" class="btn" id="resetBtn"><i class="ti ti-refresh" aria-hidden="true"></i>초기화</button>
      <button type="button" class="btn" id="homeBtn"><i class="ti ti-home" aria-hidden="true"></i>메인화면</button>
    </div>

  </form>
</div>

<!-- 접수상담조회 팝업 -->
<div class="lookupOverlay" id="lookupOverlay">
  <div class="lookupModal">
    <button class="lookupClose" type="button" onclick="closeLookupModal()">✕</button>
    <h3>접수상담조회</h3>
    <p class="sub">내담자명 + 연락처가 일치하는 가장 최근 접수 기록입니다. (참고용, 자동 입력되지 않습니다)</p>
    <div id="lookupResultBox">
      <div class="lookupRow"><b>접수일시</b><span>2026-07-10(금)_14시30분(오후)</span></div>
      <div class="lookupRow"><b>접수자명</b><span>홍길동</span></div>
      <div class="lookupRow"><b>관계</b><span>본인</span></div>
    </div>
  </div>
</div>

<script>
  // 목업 전용: 데이터 연동 없이 UI 크기/레이아웃 확인용
  const charCount = document.getElementById('charCount');
  const counselDetail = document.getElementById('counselDetail');
  counselDetail.addEventListener('input', () => { charCount.textContent = counselDetail.value.length; });
</script>

</body>
</html>
