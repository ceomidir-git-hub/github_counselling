<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>상담 등록</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css">
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    padding: 40px 20px;
    background: #f4f5f7;
    font-family: "Malgun Gothic", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    color: #222;
  }
  .container {
    max-width: 920px;
    margin: 0 auto;
    background: #ffffff;
    border: 1px solid #e0e2e7;
    border-radius: 10px;
    padding: 32px 40px 40px;
  }
  h1 {
    font-size: 26px;
    font-weight: 700;
    margin: 0 0 12px;
    color: #14171f;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  h1 i {
    font-size: 26px;
    color: #1a56db;
  }
  .section {
    border: 1px solid #e0e2e7;
    border-radius: 8px;
    padding: 20px 24px 24px;
    margin-bottom: 20px;
  }
  .section h2 {
    font-size: 19px;
    font-weight: 700;
    color: #1a56db;
    margin: 0 0 18px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .section h2 i { font-size: 19px; }
  .grid {
    display: grid;
    grid-template-columns: repeat(2, 1fr);
    gap: 16px 24px;
  }
  .grid.cols-3 {
    grid-template-columns: repeat(3, 1fr);
  }
  .grid.cols-4 {
    grid-template-columns: repeat(4, 1fr);
  }
  .field { display: flex; flex-direction: column; }
  .field.full { grid-column: 1 / -1; }
  label {
    font-size: 15px;
    font-weight: 700;
    color: #374151;
    margin-bottom: 6px;
  }
  input[type="text"],
  select,
  textarea {
    width: 100%;
    height: 40px;
    padding: 0 12px;
    border: 1px solid #d1d5db;
    border-radius: 6px;
    font-size: 16px;
    font-weight: 600;
    color: #111827;
    background: #ffffff;
    font-family: inherit;
  }
  select { cursor: pointer; }
  input[readonly] {
    background: #f3f4f6;
    color: #6b7280;
    cursor: not-allowed;
  }
  input:focus, select:focus, textarea:focus {
    outline: none;
    border-color: #1a56db;
    box-shadow: 0 0 0 3px rgba(26,86,219,0.12);
  }
  textarea {
    height: 110px;
    padding: 10px 12px;
    resize: vertical;
    line-height: 1.5;
  }
  .char-count {
    text-align: right;
    font-size: 14px;
    font-weight: 600;
    color: #9ca3af;
    margin-top: 4px;
  }
  .test-tools-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
  }
  .test-tools-row select { font-size: 15px; }
  .date-range {
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .date-range span { color: #9ca3af; font-size: 13px; flex-shrink: 0; }
  .actions {
    display: flex;
    gap: 10px;
    margin-top: 24px;
  }
  .btn {
    flex: 1;
    height: 46px;
    border-radius: 6px;
    border: 1px solid #d1d5db;
    background: #ffffff;
    color: #374151;
    font-size: 16px;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    font-family: inherit;
  }
  .btn:hover { background: #f9fafb; }
  .btn.primary {
    background: #1a56db;
    border-color: #1a56db;
    color: #ffffff;
  }
  .btn.primary:hover { background: #1747b8; }
  @media (max-width: 640px) {
    .grid, .grid.cols-3, .grid.cols-4, .test-tools-row { grid-template-columns: 1fr; }
    .actions { flex-wrap: wrap; }
  }
</style>
</head>
<body>

<div class="container">
  <h1><i class="ti ti-clipboard-heart" aria-hidden="true"></i>상담 등록</h1>

  <form id="intakeForm">

    <!-- 1. 내담자 정보 -->
    <div class="section">
      <h2><i class="ti ti-user" aria-hidden="true"></i>1. 내담자 정보</h2>
      <div class="grid">
        <div class="field">
          <label for="clientName">내담자명</label>
          <input type="text" id="clientName" placeholder="내담자명을 입력하세요">
        </div>
        <div class="field">
          <label for="clientPhone">연락처</label>
          <input type="text" id="clientPhone" placeholder="010-0000-0000">
        </div>
        <div class="field">
          <label for="job">직업</label>
          <select id="job">
            <option value="">선택하세요</option>
            <option value="학생">학생</option>
            <option value="직장인">직장인</option>
            <option value="자영업">자영업</option>
            <option value="주부">주부</option>
            <option value="무직">무직</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field">
          <label for="gender">성별</label>
          <select id="gender">
            <option value="">선택하세요</option>
            <option value="남성">남성</option>
            <option value="여성">여성</option>
          </select>
        </div>
        <div class="field">
          <label for="birthDate">생년월일</label>
          <input type="text" id="birthDate" placeholder="YYYY-MM-DD">
        </div>
        <div class="field">
          <label for="age">나이</label>
          <input type="text" id="age" placeholder="자동 계산" readonly>
        </div>
        <div class="field full">
          <label for="address">주소</label>
          <input type="text" id="address" placeholder="주소를 입력하세요">
        </div>
      </div>
    </div>

    <!-- 2. 예약 및 진행 정보 -->
    <div class="section">
      <h2><i class="ti ti-calendar-time" aria-hidden="true"></i>2. 예약 및 진행 정보</h2>
      <div class="grid cols-3">
        <div class="field">
          <label for="sessionNo">금회 회기</label>
          <select id="sessionNo">
            <option value="">선택하세요</option>
            <option value="1">1회기</option>
            <option value="2">2회기</option>
            <option value="3">3회기</option>
            <option value="4">4회기</option>
            <option value="5">5회기</option>
            <option value="6">6회기</option>
            <option value="7">7회기</option>
            <option value="8">8회기</option>
            <option value="9">9회기</option>
            <option value="10">10회기</option>
          </select>
        </div>
        <div class="field">
          <label for="expectedDate">예상일시</label>
          <input type="text" id="expectedDate" placeholder="YYYY-MM-DD HH:MM">
        </div>
        <div></div>
        <div class="field">
          <label for="startDate">실시일 시작</label>
          <input type="text" id="startDate" placeholder="YYYY-MM-DD HH:MM">
        </div>
        <div class="field">
          <label for="endDate">실시일 종료</label>
          <input type="text" id="endDate" placeholder="YYYY-MM-DD HH:MM">
        </div>
        <div class="field">
          <label for="duration">상담시간</label>
          <input type="text" id="duration" placeholder="자동 계산" readonly>
        </div>
      </div>

      <div class="field full" style="margin-top:16px;">
        <label>검사도구</label>
        <div class="test-tools-row">
          <select id="testTool1">
            <option value="">검사도구1</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
            <option value="HTP">HTP</option>
            <option value="BDI">BDI</option>
            <option value="기타">기타</option>
          </select>
          <select id="testTool2">
            <option value="">검사도구2</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
            <option value="HTP">HTP</option>
            <option value="BDI">BDI</option>
            <option value="기타">기타</option>
          </select>
          <select id="testTool3">
            <option value="">검사도구3</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
            <option value="HTP">HTP</option>
            <option value="BDI">BDI</option>
            <option value="기타">기타</option>
          </select>
          <select id="testTool4">
            <option value="">검사도구4</option>
            <option value="MMPI">MMPI</option>
            <option value="SCT">SCT</option>
            <option value="HTP">HTP</option>
            <option value="BDI">BDI</option>
            <option value="기타">기타</option>
          </select>
        </div>
      </div>
    </div>

    <!-- 3. 상담내용 -->
    <div class="section">
      <h2><i class="ti ti-notes" aria-hidden="true"></i>3. 상담내용</h2>
      <div class="grid">
        <div class="field">
          <label for="consultationTarget">상담대상</label>
          <select id="consultationTarget">
            <option value="">선택하세요</option>
            <option value="개인상담">개인상담</option>
            <option value="집단상담">집단상담</option>
            <option value="가족상담">가족상담</option>
            <option value="커플부부상담">커플부부상담</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field">
          <label for="consultationTopic">상담주제</label>
          <select id="consultationTopic">
            <option value="">선택하세요</option>
            <option value="심리/정서상담">심리/정서상담</option>
            <option value="진로/직업상담">진로/직업상담</option>
            <option value="가족상담">가족상담</option>
            <option value="비행/중독상담">비행/중독상담</option>
            <option value="기업상담">기업상담</option>
            <option value="대인관계">대인관계</option>
            <option value="부부상담">부부상담</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="field full">
          <label for="counselDetail">상세 상담내용</label>
          <textarea id="counselDetail" maxlength="1000" placeholder="상담에 대해 자세히 작성해주세요."></textarea>
          <div class="char-count"><span id="charCount">0</span> / 1000</div>
        </div>
      </div>
    </div>

    <div class="actions">
      <button type="submit" class="btn primary"><i class="ti ti-device-floppy" aria-hidden="true"></i>등록</button>
      <button type="button" class="btn" id="viewEditBtn"><i class="ti ti-edit" aria-hidden="true"></i>조회/수정/저장</button>
      <button type="reset" class="btn" id="resetBtn"><i class="ti ti-refresh" aria-hidden="true"></i>초기화</button>
      <button type="button" class="btn" id="homeBtn"><i class="ti ti-home" aria-hidden="true"></i>메인화면</button>
    </div>

  </form>
</div>

<script>
  // 생년월일 -> 나이 자동 계산
  const birthDateInput = document.getElementById('birthDate');
  const ageInput = document.getElementById('age');

  function calcAge(dateStr) {
    const m = dateStr.match(/^(\d{4})-(\d{2})-(\d{2})$/);
    if (!m) return '';
    const birth = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]));
    if (isNaN(birth.getTime())) return '';
    const today = new Date();
    let age = today.getFullYear() - birth.getFullYear();
    const monthDiff = today.getMonth() - birth.getMonth();
    if (monthDiff < 0 || (monthDiff === 0 && today.getDate() < birth.getDate())) {
      age--;
    }
    return age >= 0 ? age + '세' : '';
  }

  birthDateInput.addEventListener('input', () => {
    ageInput.value = calcAge(birthDateInput.value.trim());
  });

  // 실시일 시작/종료 -> 상담시간 자동 계산 (분 단위)
  const startDateInput = document.getElementById('startDate');
  const endDateInput = document.getElementById('endDate');
  const durationInput = document.getElementById('duration');

  function parseDateTime(str) {
    const m = str.trim().match(/^(\d{4})-(\d{2})-(\d{2})\s+(\d{2}):(\d{2})$/);
    if (!m) return null;
    const d = new Date(Number(m[1]), Number(m[2]) - 1, Number(m[3]), Number(m[4]), Number(m[5]));
    return isNaN(d.getTime()) ? null : d;
  }

  function calcDuration() {
    const start = parseDateTime(startDateInput.value);
    const end = parseDateTime(endDateInput.value);
    if (!start || !end || end <= start) {
      durationInput.value = '';
      return;
    }
    const diffMin = Math.round((end - start) / 60000);
    durationInput.value = diffMin + '분';
  }

  startDateInput.addEventListener('input', calcDuration);
  endDateInput.addEventListener('input', calcDuration);

  // 상세 상담내용 글자수 카운트
  const counselDetail = document.getElementById('counselDetail');
  const charCount = document.getElementById('charCount');
  counselDetail.addEventListener('input', () => {
    charCount.textContent = counselDetail.value.length;
  });

  // 폼 제출 (Supabase 연동 지점 - 추후 작업)
  document.getElementById('intakeForm').addEventListener('submit', (e) => {
    e.preventDefault();
    alert('등록 기능은 Supabase 연동 후 동작합니다.');
  });

  document.getElementById('viewEditBtn').addEventListener('click', () => {
    alert('조회/수정/저장 기능은 추후 구현 예정입니다.');
  });

  document.getElementById('homeBtn').addEventListener('click', () => {
    window.location.href = 'index.html';
  });
</script>

</body>
</html>
