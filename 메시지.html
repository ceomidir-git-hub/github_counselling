<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>메시지</title>

    <style>
        *{
            box-sizing:border-box;
        }

        body{
            margin:0;
            font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:transparent;
            color:#1e3a8a;
        }

        .messageBox{
            width:100%;
            min-height:29px;
            display:flex;
            align-items:center;
            gap:7px;
            font-size:12px;
            font-weight:900;
            line-height:1.25;
        }

        .messageIcon{
            flex:0 0 auto;
            font-size:14px;
        }

        .messageText{
            flex:1;
            word-break:keep-all;
        }
    </style>
</head>
<body>
    <!--
        메시지 전용 파일입니다.
        나중에 날씨정보, 오늘 일정, 알림 문구를 이 파일에서 수정하면
        index.html의 메시지 영역에 자동으로 반영됩니다.
    -->

    <div class="messageBox">
        <div class="messageIcon">💬</div>
        <div class="messageText">날씨정보 또는 오늘 일정을 보여 줄 영역입니다.</div>
    </div>
</body>
</html>
