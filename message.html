<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Message</title>
    <style>
        *{
            box-sizing:border-box;
        }
        html,
        body{
            width:100%;
            height:29px;
            margin:0;
            overflow:hidden;
            font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
            background:transparent;
            color:#1e3a8a;
        }
        .messageViewport{
            width:100%;
            height:29px;
            overflow:hidden;
            position:relative;
            display:flex;
            align-items:center;
        }
        .messageTrack{
            position:absolute;
            left:100%;
            display:inline-flex;
            align-items:center;
            gap:7px;
            white-space:nowrap;
            font-size:12px;
            font-weight:900;
            line-height:1.25;
            animation:messageFlow 18s linear infinite;
            will-change:transform;
        }
        .messageIcon{
            flex:0 0 auto;
            font-size:14px;
        }
        .messageText{
            flex:0 0 auto;
            word-break:keep-all;
        }
        @keyframes messageFlow{
            0%{
                transform:translateX(0);
            }
            100%{
                transform:translateX(calc(-100% - 100vw));
            }
        }
    </style>
</head>
<body>
    <!--
        message.html 전용 파일입니다.
        1) 사용자의 브라우저 위치(geolocation)로 현재 날씨를 가져옵니다. 도시는 고정값이 아니라
           위치에 따라 자동으로 바뀝니다.
        2) 로그인 상태일 때만 오늘/내일 예약 건수를 함께 보여줍니다. 비로그인 시에는
           "로그인 후 확인 가능" 안내만 표시합니다.
        3) 날씨 조회에 실패하면(위치 거부, 네트워크 오류 등) 시스템 관리자 문의 안내를 표시합니다.
    -->
    <div class="messageViewport">
        <div class="messageTrack" id="messageTrack">
            <div class="messageIcon">💬</div>
            <div class="messageText" id="messageText">불러오는 중...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // ===== Supabase 연결 (index.html과 동일한 세션을 sessionStorage로 공유) =====
        const SUPABASE_URL = "https://fafdxaifluftnertbpvr.supabase.co";
        const SUPABASE_ANON_KEY = "sb_publishable_RNEAVQD2wZRtZojxVU11aA_Dacmf7db";
        let sb = null;
        try {
            if (window.supabase) {
                sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
                    auth: {
                        storage: window.sessionStorage,
                        persistSession: true,
                        autoRefreshToken: true
                    }
                });
            }
        } catch (err) {
            console.error("Supabase 초기화 실패:", err);
        }

        const messageTextEl = document.getElementById("messageText");
        const messageTrackEl = document.getElementById("messageTrack");

        function setMessage(text){
            messageTextEl.textContent = text;
            // 텍스트 길이가 바뀌면 애니메이션을 처음부터 다시 실행
            messageTrackEl.style.animation = "none";
            void messageTrackEl.offsetWidth;
            messageTrackEl.style.animation = "";
        }

        const FAIL_MESSAGE = "날씨 정보를 불러오지 못했습니다. 시스템 관리자에게 문의해주세요.";

        // ===== KST 계산 헬퍼 (index.html과 동일한 방식) =====
        const KST_OFFSET_MS = 9 * 60 * 60 * 1000;

        function toKstDate(utcString){
            if (!utcString) return null;
            const utcMs = new Date(utcString).getTime();
            if (Number.isNaN(utcMs)) return null;
            return new Date(utcMs + KST_OFFSET_MS);
        }

        function kstDateKey(kstDate){
            const y = kstDate.getUTCFullYear();
            const m = String(kstDate.getUTCMonth() + 1).padStart(2, "0");
            const d = String(kstDate.getUTCDate()).padStart(2, "0");
            return `${y}-${m}-${d}`;
        }

        // ===== 날씨 코드(WMO) → 한글 설명 + 아이콘 =====
        function describeWeather(code){
            const map = {
                0: ["맑음", "☀️"],
                1: ["대체로 맑음", "🌤️"],
                2: ["부분 흐림", "⛅"],
                3: ["흐림", "☁️"],
                45: ["안개", "🌫️"],
                48: ["안개", "🌫️"],
                51: ["약한 이슬비", "🌦️"],
                53: ["이슬비", "🌦️"],
                55: ["강한 이슬비", "🌦️"],
                61: ["약한 비", "🌧️"],
                63: ["비", "🌧️"],
                65: ["강한 비", "🌧️"],
                71: ["약한 눈", "❄️"],
                73: ["눈", "❄️"],
                75: ["강한 눈", "❄️"],
                80: ["소나기", "🌧️"],
                81: ["소나기", "🌧️"],
                82: ["강한 소나기", "🌧️"],
                95: ["뇌우", "⛈️"]
            };
            return map[code] || ["-", "🌡️"];
        }

        // ===== 위치 → 지명 (한글, 실패해도 날씨는 계속 진행) =====
        async function reverseGeocode(lat, lon){
            try {
                const res = await fetch(`https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lon}&localityLanguage=ko`);
                if (!res.ok) throw new Error("reverse geocode failed");
                const data = await res.json();
                return data.city || data.locality || data.principalSubdivision || "현재 위치";
            } catch (err) {
                console.error("지명 조회 실패:", err);
                return "현재 위치";
            }
        }

        // ===== 날씨 조회 (Open-Meteo, API 키 불필요) =====
        async function fetchWeather(lat, lon){
            const res = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
            if (!res.ok) throw new Error("weather fetch failed");
            const data = await res.json();
            if (!data.current_weather) throw new Error("no current_weather in response");
            return data.current_weather; // { temperature, weathercode, ... }
        }

        // ===== 로그인 상태에서 오늘/내일 예약 건수 조회 =====
        async function fetchScheduleCounts(){
            if (!sb) return null;
            const { data: sessionData } = await sb.auth.getSession();
            if (!sessionData.session) return "LOGIN_REQUIRED";

            try {
                const { data, error } = await sb
                    .from("db_sina_counsel")
                    .select("appointment_at");
                if (error) throw error;

                const nowKst = toKstDate(new Date().toISOString());
                const todayKey = kstDateKey(nowKst);
                const tomorrowKst = new Date(nowKst.getTime() + 24 * 60 * 60 * 1000);
                const tomorrowKey = kstDateKey(tomorrowKst);

                let todayCount = 0;
                let tomorrowCount = 0;
                (data || []).forEach((row) => {
                    const apptKst = toKstDate(row.appointment_at);
                    if (!apptKst) return;
                    const key = kstDateKey(apptKst);
                    if (key === todayKey) todayCount += 1;
                    else if (key === tomorrowKey) tomorrowCount += 1;
                });

                return { todayCount, tomorrowCount };
            } catch (err) {
                console.error("일정 조회 실패:", err);
                return null;
            }
        }

        // ===== 전체 조립 =====
        async function loadMessage(){
            if (!navigator.geolocation) {
                setMessage(FAIL_MESSAGE);
                return;
            }

            navigator.geolocation.getCurrentPosition(
                async (position) => {
                    try {
                        const { latitude, longitude } = position.coords;

                        const [weather, cityName, schedule] = await Promise.all([
                            fetchWeather(latitude, longitude),
                            reverseGeocode(latitude, longitude),
                            fetchScheduleCounts()
                        ]);

                        const [desc, icon] = describeWeather(weather.weathercode);
                        const temp = Math.round(weather.temperature);

                        let scheduleText;
                        if (schedule === "LOGIN_REQUIRED") {
                            scheduleText = "일정 확인은 로그인 후 가능합니다";
                        } else if (schedule) {
                            scheduleText = `오늘 예약 ${schedule.todayCount}건 · 내일 예약 ${schedule.tomorrowCount}건`;
                        } else {
                            scheduleText = "일정 정보를 불러오지 못했습니다";
                        }

                        setMessage(`📍${cityName} ${icon} ${temp}°C ${desc}  |  ${scheduleText}`);
                    } catch (err) {
                        console.error("메시지 조립 실패:", err);
                        setMessage(FAIL_MESSAGE);
                    }
                },
                (err) => {
                    console.error("위치 정보 조회 실패:", err);
                    setMessage(FAIL_MESSAGE);
                },
                { timeout: 8000, maximumAge: 10 * 60 * 1000 }
            );
        }

        loadMessage();
    </script>
</body>
</html>
