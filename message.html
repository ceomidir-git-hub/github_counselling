<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Message</title>
    <style>
        *{box-sizing:border-box}
        body{margin:0;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:transparent;color:#1e3a8a}
        .messageBox{width:100%;min-height:24px;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:900;line-height:1.15;word-break:keep-all}
        .messageIcon{flex:0 0 auto;font-size:14px}
        .messageText{flex:1}
    </style>
</head>
<body>
    <div id="messageRoot" class="messageBox">
        <div class="messageIcon">💬</div>
        <div class="messageText">메시지를 준비하고 있습니다.</div>
    </div>

    <script src="js/message.js"></script>
    <script>
        renderMessage('messageRoot');
    </script>
</body>
</html>
