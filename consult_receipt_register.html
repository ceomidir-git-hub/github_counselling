<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접수 상담 등록</title>
  <style>
    :root {
      --blue: #0b63e5;
      --blue-dark: #0b2a66;
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #111827;
      --muted: #718096;
      --line: #dbe3ee;
      --line-soft: #edf1f7;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --field-height: 46px;
      --label-width: 136px;
      --green: #16a34a;
      --red: #dc2626;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eaf3ff, #ffffff);
      color: var(--text);
    }

    button, input, select, textarea { font: inherit; }

    .page {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone {
      width: min(430px, 100%);
      min-height: 860px;
      background: #101010;
      border-radius: 42px;
      padding: 12px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.35);
    }

    .screen {
      min-height: 836px;
      background: #ffffff;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
    }

    .status {
      height: 58px;
      padding: 16px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-weight: 800;
      color: #111827;
      position: relative;
    }

    .status::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      width: 104px;
      height: 31px;
      background: #050505;
      border-radius: 999px;
    }

    .status span { position: relative; z-index: 1; font-size: 13px; }

    .container { padding: 18px 18px 24px; }

    .page-title {
      margin: 0 0 18px;
      color: var(--blue-dark);
      font-size: 30px;
      line-height: 1.15;
      font-weight: 950;
      letter-spacing: -1.2px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.035);
    }

    .section-title {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 17px;
      font-weight: 950;
      letter-spacing: -0.4px;
    }

    .form-grid { display: grid; gap: 10px; }

    .form-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 10px;
      align-items: center;
    }

    .datetime-controls {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
    }

    label {
      font-size: 14px;
      font-weight: 850;
      color: #111827;
      letter-spacing: -0.3px;
    }

    .field, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #111827;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease;
    }

    .field, select {
      height: var(--field-height);
      padding: 0 12px;
      font-size: 14px;
      min-width: 0;
    }

    .field[readonly] {
      background: #f1f5f9;
      color: #64748b;
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #475569 50%),
        linear-gradient(135deg, #475569 50%, transparent 50%);
      background-position: calc(100% - 18px) 19px, calc(100% - 13px) 19px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 28px;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .field:focus, select:focus, textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(11, 99, 229, 0.12);
    }

    .field::placeholder, textarea::placeholder { color: #94a3b8; }

    .hint {
      grid-column: 2 / -1;
      font-size: 11px;
      color: var(--muted);
      margin-top: -4px;
    }

    .preview-badge {
      display: inline-block;
      font-size: 12px;
      font-weight: 850;
      color: var(--blue);
      background: #eef4ff;
      border: 1px solid #d7e6ff;
      border-radius: 8px;
      padding: 5px 10px;
    }

    .preview-row { margin-top: -2px; }

    .textarea-wrap { position: relative; }

    .counter {
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.88);
      padding-left: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 8px;
      margin-top: 18px;
      padding-bottom: 6px;
    }

    .btn {
      height: 48px;
      border-radius: 10px;
      border: 1px solid #b7c3d3;
      background: #fff;
      color: #475569;
      font-weight: 950;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-decoration: none;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .btn.primary {
      background: linear-gradient(135deg, #0b63e5, #1d74f5);
      color: #fff;
      border-color: #0b63e5;
      box-shadow: 0 8px 18px rgba(11, 99, 229, 0.25);
    }

    .btn.primary:disabled {
      opacity: .6;
      cursor: not-allowed;
    }

    .btn:active { transform: translateY(1px); }

    .statusMsg {
      display: none;
      border-radius: 12px;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 850;
      margin-bottom: 12px;
    }

    .statusMsg.show { display: block; }

    .statusMsg.success {
      background: #ecfdf3;
      border: 1px solid #bbf7d0;
      color: var(--green);
    }

    .statusMsg.error {
      background: #fef2f2;
      border: 1px solid #fecaca;
      color: var(--red);
    }

    .field.invalid, select.invalid {
      border-color: var(--red);
      box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.10);
    }

    /* ===== 조회 시 후보(동명이인 연락처 / 여러 접수건) 선택 리스트 ===== */
    .lookup-item {
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: border-color 0.15s ease, box-shadow 0.15s ease, background 0.15s ease;
      background: #fff;
    }

    .lookup-item:hover, .lookup-item:active {
      border-color: var(--blue);
      background: #f7fbff;
      box-shadow: 0 4px 12px rgba(11, 99, 229, 0.12);
    }

    .lookup-item-date {
      font-weight: 850;
      color: var(--blue-dark);
      font-size: 13px;
      margin-bottom: 4px;
    }

    .lookup-item-sub {
      font-size: 12px;
      color: var(--muted);
    }

    .lookup-result-count {
      font-size: 12px;
      color: var(--muted);
      font-weight: 800;
      margin-bottom: 8px;
    }

    /* 조회 결과를 불러와 수정 중인 상태임을 알려주는 배지 */
    .edit-mode-badge {
      display: none;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 850;
      color: #92400e;
      background: #fffbeb;
      border: 1px solid #fde68a;
      border-radius: 10px;
      padding: 8px 12px;
      margin-bottom: 12px;
    }
    .edit-mode-badge.show { display: flex; }

    @media (max-width: 480px) {
      .page { padding: 0; background: #fff; }
      .phone { width: 100%; min-height: 100vh; padding: 0; border-radius: 0; background: #fff; box-shadow: none; }
      .screen { min-height: 100vh; border-radius: 0; }
      .container { padding: 14px 14px 22px; }
      .page-title { font-size: 28px; margin-bottom: 16px; }
      .section { padding: 15px 12px; border-radius: 15px; }
      .form-row { grid-template-columns: 100px 1fr; gap: 8px; }
      label { font-size: 13px; }
      .field, select { height: 44px; font-size: 13px; }
      textarea { min-height: 108px; font-size: 13px; }
      .actions { gap: 6px; }
      .btn { height: 46px; font-size: 12px; padding: 0 4px; }
    }

    @media (max-width: 360px) {
      .form-row { grid-template-columns: 1fr; gap: 5px; }
      .btn { font-size: 13px; }
      .hint { grid-column: 1 / -1; }
    }

    @media (min-width: 700px) {
      .phone { width: min(760px, 100%); min-height: auto; border-radius: 34px; }
      .screen { min-height: auto; border-radius: 24px; }
      .container { padding: 24px 28px 28px; }
      .page-title { font-size: 34px; }
      .section { padding: 18px 22px; }
      .form-grid { grid-template-columns: repeat(2, minmax(0, 1fr)); column-gap: 28px; row-gap: 12px; }
      .form-row.full { grid-column: 1 / -1; }
      .actions { grid-template-columns: repeat(4, 1fr); max-width: 720px; margin-left: auto; margin-right: auto; }
    }

    @media (min-width: 1100px) {
      .page { padding: 36px; }
      .phone { width: min(980px, 100%); padding: 0; background: transparent; box-shadow: none; }
      .screen { border-radius: 22px; box-shadow: var(--shadow); }
      .status { display: none; }
      .container { padding: 34px 42px 36px; }
      .section { padding: 20px 26px; }
      .form-row { grid-template-columns: var(--label-width) 1fr; }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="phone">
      <div class="screen">
        <div class="status">
          <span>9:41</span>
          <span>●●● 5G 🔋</span>
        </div>

        <div class="container">
          <h1 class="page-title">접수 상담 등록</h1>

          <div class="edit-mode-badge" id="editModeBadge">✎ 조회된 기존 접수 데이터를 수정 중입니다. 저장을 누르면 해당 기록이 업데이트됩니다.</div>

          <div class="statusMsg" id="statusMsg"></div>
          <div class="statusMsg" id="lookupMsg"></div>
          <div id="lookupSelectionArea" style="display:none; margin-bottom:12px;"></div>

          <form id="consultForm">
            <section class="section">
              <h2 class="section-title">1. 접수 정보</h2>

              <div class="form-grid">
                <div class="form-row full">
                  <label for="receivedDate">접수일시</label>
                  <div class="datetime-controls">
                    <input id="receivedDate" class="field" type="date" />
                    <select id="receivedTime">
                      <option value="" selected disabled>시간 선택</option>
                    </select>
                  </div>
                </div>
                <div class="form-row full preview-row">
                  <span></span>
                  <span class="preview-badge" id="receivedPreview">접수일시를 선택하면 표시됩니다.</span>
                </div>

                <div class="form-row full">
                  <label for="reservationDate">예약일</label>
                  <div class="datetime-controls">
                    <input id="reservationDate" class="field" type="date" />
                    <select id="reservationTime">
                      <option value="" selected disabled>시간 선택</option>
                    </select>
                  </div>
                </div>
                <div class="form-row full preview-row">
                  <span></span>
                  <span class="preview-badge" id="reservationPreview">예약일과 시간을 선택하면 표시됩니다.</span>
                </div>

                <div class="form-row">
                  <label for="receptionistName">접수자명</label>
                  <input id="receptionistName" class="field" type="text" placeholder="접수자명을 입력하세요" />
                </div>

                <div class="form-row">
                  <label for="receptionistPhone">접수자 연락처</label>
                  <input id="receptionistPhone" class="field" type="tel" placeholder="010-0000-0000" maxlength="13" inputmode="numeric" />
                </div>

                <div class="form-row full">
                  <label for="relationship">내담자 관계</label>
                  <select id="relationship">
                    <option selected>본인</option>
                    <option>부모</option>
                    <option>배우자</option>
                    <option>자녀</option>
                    <option>기타</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">2. 내담자 정보</h2>
              <div class="hint" style="grid-column:1/-1; margin-bottom:10px;">💡 내담자명(+연락처)을 입력한 뒤 하단의 <b>🔍 조회</b> 버튼을 누르면 기존 접수 기록을 이 폼으로 불러올 수 있습니다.</div>

              <div class="form-grid">
                <div class="form-row">
                  <label for="clientName">내담자명</label>
                  <input id="clientName" class="field" type="text" placeholder="내담자명을 입력하세요" />
                </div>

                <div class="form-row">
                  <label for="gender">성별</label>
                  <select id="gender">
                    <option selected disabled value="">불러오는 중...</option>
                  </select>
                </div>

                <div class="form-row">
                  <label for="clientPhone">연락처</label>
                  <input id="clientPhone" class="field" type="tel" placeholder="010-0000-0000 (조회 시 선택 입력)" maxlength="13" inputmode="numeric" />
                </div>

                <div class="form-row">
                  <label for="birthDate">생년월일</label>
                  <input id="birthDate" class="field" type="text" placeholder="0000-00-00" maxlength="10" inputmode="numeric" />
                </div>

                <div class="form-row">
                  <label for="job">직업</label>
                  <select id="job">
                    <option selected disabled value="">불러오는 중...</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">3. 상담 신청 내용</h2>

              <div class="form-grid">
                <div class="form-row">
                  <label for="consultationTarget">상담대상</label>
                  <select id="consultationTarget">
                    <option selected disabled value="">불러오는 중...</option>
                  </select>
                </div>

                <div class="form-row">
                  <label for="consultationTopic">상담주제</label>
                  <select id="consultationTopic">
                    <option selected disabled value="">불러오는 중...</option>
                  </select>
                </div>

                <div class="form-row full">
                  <label for="details">접수상담내용</label>
                  <div class="textarea-wrap">
                    <textarea id="details" maxlength="1000" placeholder="상담에 대해 자세히 작성해주세요."></textarea>
                    <span class="counter" id="detailsCounter">0 / 1000</span>
                  </div>
                </div>
              </div>
            </section>

            <div class="actions">
              <button type="submit" class="btn primary" id="submitBtn">▣ 등록</button>
              <button type="button" class="btn primary" id="lookupSaveBtn">🔍 조회</button>
              <button type="button" class="btn" id="resetBtn">↻ 초기화</button>
              <a href="index.html" class="btn">⌂ 메인화면</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <!-- Supabase JS SDK -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== 0) UI 초기화는 Supabase 연결 성공 여부와 무관하게 항상 먼저 실행 =====
    const DAY_KR = ["일", "월", "화", "수", "목", "금", "토"];

    // ===== 0-1) 조회/등록 모드 상태 =====
    // mode: "new"  -> 새 접수 등록 모드 (기본)
    // mode: "loaded" -> 조회로 기존 기록을 불러와 수정 중인 모드
    let mode = "new";
    let loadedRecordId = null;

    // 1) 접수일시: 날짜+시간 드롭다운 (기본값 = 현재 KST 시각, 수정 가능)
    const receivedDateEl = document.getElementById("receivedDate");
    const receivedTimeEl = document.getElementById("receivedTime");
    const receivedPreviewEl = document.getElementById("receivedPreview");

    function getNowKSTParts() {
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Seoul",
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).formatToParts(new Date());
      const map = {};
      parts.forEach(p => map[p.type] = p.value);
      return { date: `${map.year}-${map.month}-${map.day}`, hour: parseInt(map.hour, 10), minute: parseInt(map.minute, 10) };
    }

    // 시간 옵션 생성: 00:00 ~ 23:50, 10분 단위 (접수는 하루 중 언제든 가능)
    (function buildReceivedTimeOptions() {
      for (let h = 0; h <= 23; h++) {
        for (let m of [0, 10, 20, 30, 40, 50]) {
          const hh = String(h).padStart(2, "0");
          const mm = String(m).padStart(2, "0");
          const ampm = h < 12 ? "오전" : "오후";
          const opt = document.createElement("option");
          opt.value = `${hh}:${mm}`;
          opt.textContent = `${hh}:${mm} (${ampm})`;
          receivedTimeEl.appendChild(opt);
        }
      }
    })();

    function setReceivedDefaultToNow() {
      const nowKST = getNowKSTParts();
      const roundedMinute = Math.floor(nowKST.minute / 10) * 10;
      receivedDateEl.value = nowKST.date;
      receivedTimeEl.value = `${String(nowKST.hour).padStart(2, "0")}:${String(roundedMinute).padStart(2, "0")}`;
      updateReceivedPreview();
    }

    function updateReceivedPreview() {
      const dateVal = receivedDateEl.value;
      const timeVal = receivedTimeEl.value;
      if (!dateVal || !timeVal) {
        receivedPreviewEl.textContent = "접수일시를 선택하면 여기에 표시됩니다.";
        return;
      }
      const d = new Date(dateVal + "T00:00:00");
      const dayLabel = DAY_KR[d.getDay()];
      const ampm = parseInt(timeVal.split(":")[0], 10) < 12 ? "오전" : "오후";
      receivedPreviewEl.textContent = `${dateVal}(${dayLabel}),${timeVal}(${ampm})`;
    }
    receivedDateEl.addEventListener("change", updateReceivedPreview);
    receivedTimeEl.addEventListener("change", updateReceivedPreview);

    function getReceivedISO() {
      const dateVal = receivedDateEl.value;
      const timeVal = receivedTimeEl.value;
      if (!dateVal || !timeVal) return null;
      return new Date(`${dateVal}T${timeVal}:00+09:00`).toISOString();
    }

    setReceivedDefaultToNow();

    // 2) 연락처 자동 하이픈 포맷 (000-0000-0000)
    function attachPhoneFormatter(inputEl) {
      inputEl.addEventListener("input", () => {
        let digits = inputEl.value.replace(/\D/g, "").slice(0, 11);
        let formatted = digits;
        if (digits.length > 3 && digits.length <= 7) {
          formatted = digits.slice(0, 3) + "-" + digits.slice(3);
        } else if (digits.length > 7) {
          formatted = digits.slice(0, 3) + "-" + digits.slice(3, 7) + "-" + digits.slice(7);
        }
        inputEl.value = formatted;
      });
    }
    const receptionistPhoneEl = document.getElementById("receptionistPhone");
    const clientPhoneEl = document.getElementById("clientPhone");
    attachPhoneFormatter(receptionistPhoneEl);
    attachPhoneFormatter(clientPhoneEl);

    function isValidPhone(value) {
      return /^\d{3}-\d{3,4}-\d{4}$/.test(value);
    }

    // 3) 생년월일 자동 하이픈 포맷 (0000-00-00)
    const birthDateEl = document.getElementById("birthDate");
    birthDateEl.addEventListener("input", () => {
      let digits = birthDateEl.value.replace(/\D/g, "").slice(0, 8);
      let formatted = digits;
      if (digits.length > 4 && digits.length <= 6) {
        formatted = digits.slice(0, 4) + "-" + digits.slice(4);
      } else if (digits.length > 6) {
        formatted = digits.slice(0, 4) + "-" + digits.slice(4, 6) + "-" + digits.slice(6);
      }
      birthDateEl.value = formatted;
    });

    function isValidBirthDate(value) {
      const m = value.match(/^(\d{4})-(\d{2})-(\d{2})$/);
      if (!m) return false;
      const year = parseInt(m[1], 10);
      const month = parseInt(m[2], 10);
      const day = parseInt(m[3], 10);
      if (month < 1 || month > 12) return false;
      const daysInMonth = new Date(year, month, 0).getDate();
      if (day < 1 || day > daysInMonth) return false;
      return true;
    }

    function birthDateToISO(value) {
      // 이미 0000-00-00 형식이므로 그대로 사용
      return value;
    }

    // 4) 예약일: 날짜 + 시간 선택 → 자동 표시 + ISO 변환
    const reservationDateEl = document.getElementById("reservationDate");
    const reservationTimeEl = document.getElementById("reservationTime");
    const reservationPreviewEl = document.getElementById("reservationPreview");

    // 시간 옵션 생성: 09:00 ~ 20:00, 30분 단위
    (function buildTimeOptions() {
      for (let h = 9; h <= 20; h++) {
        for (let m of [0, 30]) {
          if (h === 20 && m === 30) continue;
          const hh = String(h).padStart(2, "0");
          const mm = String(m).padStart(2, "0");
          const ampm = h < 12 ? "오전" : "오후";
          const opt = document.createElement("option");
          opt.value = `${hh}:${mm}`;
          opt.textContent = `${hh}:${mm} (${ampm})`;
          reservationTimeEl.appendChild(opt);
        }
      }
    })();

    function updateReservationPreview() {
      const dateVal = reservationDateEl.value;
      const timeVal = reservationTimeEl.value;
      if (!dateVal || !timeVal) {
        reservationPreviewEl.textContent = "예약일과 시간을 선택하면 여기에 표시됩니다.";
        return;
      }
      const d = new Date(dateVal + "T00:00:00");
      const dayLabel = DAY_KR[d.getDay()];
      const ampm = parseInt(timeVal.split(":")[0], 10) < 12 ? "오전" : "오후";
      reservationPreviewEl.textContent = `${dateVal}(${dayLabel}),${timeVal}(${ampm})`;
    }
    reservationDateEl.addEventListener("change", updateReservationPreview);
    reservationTimeEl.addEventListener("change", updateReservationPreview);

    function getAppointmentISO() {
      const dateVal = reservationDateEl.value;
      const timeVal = reservationTimeEl.value;
      if (!dateVal || !timeVal) return null;
      // KST(+09:00) 고정 오프셋으로 명시하여 UTC 변환 오류 방지
      return new Date(`${dateVal}T${timeVal}:00+09:00`).toISOString();
    }

    // 4-1) 저장된 ISO(UTC) 시각을 KST 기준 {date, time} 문자열로 변환 (조회 결과를 폼에 채울 때 사용)
    function isoToKSTParts(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      if (isNaN(d.getTime())) return null;
      const parts = new Intl.DateTimeFormat("en-CA", {
        timeZone: "Asia/Seoul",
        year: "numeric", month: "2-digit", day: "2-digit",
        hour: "2-digit", minute: "2-digit", hour12: false
      }).formatToParts(d);
      const map = {};
      parts.forEach(p => map[p.type] = p.value);
      return { date: `${map.year}-${map.month}-${map.day}`, time: `${map.hour}:${map.minute}` };
    }

    // 드롭다운에 없는 시간값(과거 데이터 등)이어도 항상 정확히 선택되도록 옵션을 임시 추가
    function setTimeSelectValue(selectEl, timeStr) {
      if (!timeStr) return;
      let opt = Array.from(selectEl.options).find(o => o.value === timeStr);
      if (!opt) {
        const ampm = parseInt(timeStr.split(":")[0], 10) < 12 ? "오전" : "오후";
        opt = document.createElement("option");
        opt.value = timeStr;
        opt.textContent = `${timeStr} (${ampm})`;
        selectEl.appendChild(opt);
      }
      selectEl.value = timeStr;
    }

    function escapeHTML(str) {
      if (str === null || str === undefined || str === "") return "";
      return String(str)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    function formatKST(iso) {
      const parts = isoToKSTParts(iso);
      if (!parts) return "-";
      const dObj = new Date(parts.date + "T00:00:00");
      const dayLabel = DAY_KR[dObj.getDay()];
      const ampm = parseInt(parts.time.split(":")[0], 10) < 12 ? "오전" : "오후";
      return `${parts.date}(${dayLabel}) ${parts.time}(${ampm})`;
    }

    const SUPABASE_URL = "https://fafdxaifluftnertbpvr.supabase.co";

    // ===== 7-1) lookup 테이블(sex_codes, counsel_client_type, counsel_topic, job_codes)에서 옵션 동적 로딩 =====

    async function initAuth() {

    // ===== 8) 등록/저장 폼 값 수집 + 검증 (등록 · 조회 후 수정 저장 공통 사용) =====
    function collectAndValidateFormData() {

      const appointmentISO = getAppointmentISO();

      const receivedISO = getReceivedISO();

      if (!receivedISO) hasError = true;

      const payload = {
        received_at: receivedISO,

        counsel_client_type: consultationTarget,

    // ===== 9) 등록(신규) 처리 =====

      // 로그인 상태가 아니면 등록을 진행하지 않음 (버튼은 잠겨있지만 이중 방어)
      if (!isLoggedIn()) {

    // ===== 10) 접수 상담 조회 → 폼에 채우기 → 수정 후 저장 =====

    function populateFormFromRecord(row) {

    async function handleLookup() {

        showLookupMsg("error", "내담자명을 입력해주세요.");

      markInvalid(document.getElementById("clientName"), false);

      if (phone && !isValidPhone(phone)) {

      if (!isLoggedIn()) {

        showStatus("error", "수정할 기존 데이터가 없습니다. 먼저 조회를 진행해주세요.");

        return;
      }

      const confirmed = window.confirm("저장하시겠습니까? 기존 접수 상담 데이터가 수정됩니다.");
      if (!confirmed) return;

      lookupSaveBtn.disabled = true;
      lookupSaveBtn.textContent = "저장 중...";

      const { error } = await sb.from(TABLE_NAME).update(payload).eq("id", loadedRecordId);

      lookupSaveBtn.disabled = !isLoggedIn();
      lookupSaveBtn.textContent = "💾 저장";

      if (error) {
        console.error(error);
        showStatus("error", "수정 저장 중 오류가 발생했습니다: " + error.message);
        return;
      }

      showStatus("success", "접수 상담 정보가 수정되었습니다.");
      resetFormToNewMode();
    }

    lookupSaveBtn.addEventListener("click", () => {
      if (mode === "loaded") {
        handleSave();
      } else {
        handleLookup();
      }
    });
  </script>
</body>
</html>
