<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>접수 상담 등록</title>
  <style>
    :root {
      --blue: #0b63e5;
      --blue-dark: #0b2a66;
      --bg: #f7f9fc;
      --card: #ffffff;
      --text: #111827;
      --muted: #718096;
      --line: #dbe3ee;
      --line-soft: #edf1f7;
      --shadow: 0 12px 32px rgba(15, 23, 42, 0.08);
      --radius: 18px;
      --field-height: 46px;
      --label-width: 136px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: linear-gradient(135deg, #eaf3ff, #ffffff);
      color: var(--text);
    }

    button,
    input,
    select,
    textarea {
      font: inherit;
    }

    .page {
      min-height: 100vh;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }

    .phone {
      width: min(430px, 100%);
      min-height: 860px;
      background: #101010;
      border-radius: 42px;
      padding: 12px;
      box-shadow: 0 22px 60px rgba(15, 23, 42, 0.35);
    }

    .screen {
      min-height: 836px;
      background: #ffffff;
      border-radius: 32px;
      overflow: hidden;
      position: relative;
    }

    .status {
      height: 58px;
      padding: 16px 24px 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      font-weight: 800;
      color: #111827;
      position: relative;
    }

    .status::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 14px;
      transform: translateX(-50%);
      width: 104px;
      height: 31px;
      background: #050505;
      border-radius: 999px;
    }

    .status span {
      position: relative;
      z-index: 1;
      font-size: 13px;
    }

    .container {
      padding: 18px 18px 24px;
    }

    .page-title {
      margin: 0 0 18px;
      color: var(--blue-dark);
      font-size: 30px;
      line-height: 1.15;
      font-weight: 950;
      letter-spacing: -1.2px;
    }

    .section {
      background: var(--card);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      padding: 16px 14px;
      margin-bottom: 12px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.035);
    }

    .section-title {
      margin: 0 0 16px;
      color: var(--blue);
      font-size: 17px;
      font-weight: 950;
      letter-spacing: -0.4px;
    }

    .form-grid {
      display: grid;
      gap: 10px;
    }

    .form-row {
      display: grid;
      grid-template-columns: 96px 1fr;
      gap: 10px;
      align-items: center;
    }

    label {
      font-size: 14px;
      font-weight: 850;
      color: #111827;
      letter-spacing: -0.3px;
    }

    .field,
    select,
    textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 9px;
      background: #fff;
      color: #111827;
      outline: none;
      transition: border 0.15s ease, box-shadow 0.15s ease;
    }

    .field,
    select {
      height: var(--field-height);
      padding: 0 12px;
      font-size: 14px;
    }

    select {
      appearance: none;
      background-image: linear-gradient(45deg, transparent 50%, #475569 50%),
        linear-gradient(135deg, #475569 50%, transparent 50%);
      background-position: calc(100% - 18px) 19px, calc(100% - 13px) 19px;
      background-size: 5px 5px, 5px 5px;
      background-repeat: no-repeat;
      padding-right: 36px;
    }

    textarea {
      min-height: 116px;
      resize: vertical;
      padding: 12px;
      font-size: 14px;
      line-height: 1.5;
    }

    .field:focus,
    select:focus,
    textarea:focus {
      border-color: var(--blue);
      box-shadow: 0 0 0 3px rgba(11, 99, 229, 0.12);
    }

    .field::placeholder,
    textarea::placeholder {
      color: #94a3b8;
    }

    .field-wrap {
      position: relative;
    }

    .field-wrap .field {
      padding-right: 38px;
    }

    .icon {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
      color: #475569;
      font-size: 15px;
      pointer-events: none;
    }

    .textarea-wrap {
      position: relative;
    }

    .counter {
      position: absolute;
      right: 12px;
      bottom: 10px;
      color: #64748b;
      font-size: 12px;
      font-weight: 700;
      background: rgba(255, 255, 255, 0.88);
      padding-left: 8px;
    }

    .actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-top: 18px;
      padding-bottom: 6px;
    }

    .btn {
      height: 48px;
      border-radius: 10px;
      border: 1px solid #b7c3d3;
      background: #fff;
      color: #475569;
      font-weight: 950;
      font-size: 13px;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      text-decoration: none;
      letter-spacing: -0.5px;
      white-space: nowrap;
    }

    .btn.primary {
      background: linear-gradient(135deg, #0b63e5, #1d74f5);
      color: #fff;
      border-color: #0b63e5;
      box-shadow: 0 8px 18px rgba(11, 99, 229, 0.25);
    }

    .btn.outline-blue {
      border-color: var(--blue);
      color: var(--blue);
    }

    .btn:active {
      transform: translateY(1px);
    }

    /* 일반 핸드폰 기준 */
    @media (max-width: 480px) {
      .page {
        padding: 0;
        background: #fff;
      }

      .phone {
        width: 100%;
        min-height: 100vh;
        padding: 0;
        border-radius: 0;
        background: #fff;
        box-shadow: none;
      }

      .screen {
        min-height: 100vh;
        border-radius: 0;
      }

      .container {
        padding: 14px 14px 22px;
      }

      .page-title {
        font-size: 28px;
        margin-bottom: 16px;
      }

      .section {
        padding: 15px 12px;
        border-radius: 15px;
      }

      .form-row {
        grid-template-columns: 100px 1fr;
        gap: 8px;
      }

      label {
        font-size: 13px;
      }

      .field,
      select {
        height: 44px;
        font-size: 13px;
      }

      textarea {
        min-height: 108px;
        font-size: 13px;
      }

      .actions {
        gap: 6px;
      }

      .btn {
        height: 46px;
        font-size: 12px;
        padding: 0 4px;
      }
    }

    /* 좁은 핸드폰 */
    @media (max-width: 360px) {
      .form-row {
        grid-template-columns: 1fr;
        gap: 5px;
      }

      .actions {
        grid-template-columns: repeat(2, 1fr);
      }

      .btn {
        font-size: 13px;
      }
    }

    /* 삼성 폴드 펼침 / 태블릿 */
    @media (min-width: 700px) {
      .phone {
        width: min(760px, 100%);
        min-height: auto;
        border-radius: 34px;
      }

      .screen {
        min-height: auto;
        border-radius: 24px;
      }

      .container {
        padding: 24px 28px 28px;
      }

      .page-title {
        font-size: 34px;
      }

      .section {
        padding: 18px 22px;
      }

      .form-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
        column-gap: 28px;
        row-gap: 12px;
      }

      .form-row.full {
        grid-column: 1 / -1;
      }

      .actions {
        max-width: 620px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    /* PC */
    @media (min-width: 1100px) {
      .page {
        padding: 36px;
      }

      .phone {
        width: min(980px, 100%);
        padding: 0;
        background: transparent;
        box-shadow: none;
      }

      .screen {
        border-radius: 22px;
        box-shadow: var(--shadow);
      }

      .status {
        display: none;
      }

      .container {
        padding: 34px 42px 36px;
      }

      .section {
        padding: 20px 26px;
      }

      .form-row {
        grid-template-columns: var(--label-width) 1fr;
      }
    }
  </style>
</head>
<body>
  <div class="page">
    <main class="phone">
      <div class="screen">
        <div class="status">
          <span>9:41</span>
          <span>●●● 5G 🔋</span>
        </div>

        <div class="container">
          <h1 class="page-title">접수 상담 등록</h1>

          <form id="consultForm">
            <section class="section">
              <h2 class="section-title">1. 접수 정보</h2>

              <div class="form-grid">
                <div class="form-row">
                  <label for="receivedAt">접수일시</label>
                  <div class="field-wrap">
                    <input id="receivedAt" name="received_at" class="field" type="text" value="2025-05-26 10:30" />
                    <span class="icon">▣</span>
                  </div>
                </div>

                <div class="form-row">
                  <label for="reservationDate">예약일</label>
                  <div class="field-wrap">
                    <input id="reservationDate" name="reservation_date" class="field" type="text" value="2025-05-30" />
                    <span class="icon">▣</span>
                  </div>
                </div>

                <div class="form-row">
                  <label for="receptionistName">접수자명</label>
                  <input id="receptionistName" name="receptionist_name" class="field" type="text" value="홍길동" />
                </div>

                <div class="form-row">
                  <label for="receptionistPhone">접수자 연락처</label>
                  <input id="receptionistPhone" name="receptionist_phone" class="field" type="tel" value="010-1234-5678" />
                </div>

                <div class="form-row full">
                  <label for="relationship">내담자와의 관계</label>
                  <select id="relationship" name="relationship">
                    <option selected>본인</option>
                    <option>부모</option>
                    <option>배우자</option>
                    <option>자녀</option>
                    <option>기타</option>
                  </select>
                </div>
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">2. 내담자 정보</h2>

              <div class="form-grid">
                <div class="form-row">
                  <label for="clientName">내담자명</label>
                  <input id="clientName" name="client_name" class="field" type="text" placeholder="내담자명을 입력하세요" />
                </div>

                <div class="form-row">
                  <label for="gender">성별</label>
                  <select id="gender" name="gender">
                    <option selected disabled>선택하세요</option>
                    <option>남성</option>
                    <option>여성</option>
                    <option>기타</option>
                  </select>
                </div>

                <div class="form-row">
                  <label for="clientPhone">연락처</label>
                  <input id="clientPhone" name="client_phone" class="field" type="tel" placeholder="010-0000-0000" />
                </div>

                <div class="form-row">
                  <label for="birthDate">생년월일</label>
                  <div class="field-wrap">
                    <input id="birthDate" name="birth_date" class="field" type="text" placeholder="생년월일을 입력하세요" />
                    <span class="icon">▣</span>
                  </div>
                </div>

                <div class="form-row">
                  <label for="job">직업</label>
                  <input id="job" name="job" class="field" type="text" placeholder="직업을 입력하세요" />
                </div>
              </div>
            </section>

            <section class="section">
              <h2 class="section-title">3. 상담 신청 내용</h2>

              <div class="form-grid">
                <div class="form-row">
                  <label for="consultationTarget">상담대상</label>
                  <select id="consultationTarget" name="consultation_target">
                    <option selected disabled>선택하세요</option>
                    <option>개인상담</option>
                    <option>집단상담</option>
                    <option>가족상담</option>
                    <option>커플부부상담</option>
                    <option>기타</option>
                  </select>
                </div>

                <div class="form-row">
                  <label for="consultationTopic">상담주제</label>
                  <select id="consultationTopic" name="consultation_topic">
                    <option selected disabled>선택하세요</option>
                    <option>심리/정서상담</option>
                    <option>진로/직업상담</option>
                    <option>가족상담</option>
                    <option>비행/중독상담</option>
                    <option>기업상담</option>
                    <option>대인관계</option>
                    <option>부부상담</option>
                    <option>기타</option>
                  </select>
                </div>

                <div class="form-row full">
                  <label for="details">상세 상담내용</label>
                  <div class="textarea-wrap">
                    <textarea id="details" name="details_of_consultation" maxlength="1000" placeholder="상담에 대해 자세히 작성해주세요."></textarea>
                    <span class="counter" id="detailsCounter">0 / 1000</span>
                  </div>
                </div>
              </div>
            </section>

            <div class="actions">
              <button type="button" class="btn primary">▣ 등록</button>
              <button type="button" class="btn outline-blue">✎ 수정/저장</button>
              <button type="reset" class="btn">↻ 초기화</button>
              <a href="index.html" class="btn">⌂ 메인화면</a>
            </div>
          </form>
        </div>
      </div>
    </main>
  </div>

  <script>
    const details = document.getElementById("details");
    const detailsCounter = document.getElementById("detailsCounter");

    details.addEventListener("input", () => {
      detailsCounter.textContent = `${details.value.length} / 1000`;
    });
  </script>
</body>
</html>
