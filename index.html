<!DOCTYPE html>
<html lang="ko">
 <head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1" name="viewport"/>
  <title>
   상담도우미
  </title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/tabler-icons/2.47.0/iconfont/tabler-icons.min.css"/>
  <style>
   :root{
    --blue:#0b4ea2;
    --blue2:#1565d8;
    --bg:#f3f7fc;
    --card:#fff;
    --ink:#111827;
    --muted:#64748b;
    --line:#e5e7eb;
    --red:#ef4444;
    --orange:#f97316;
    --yellow:#eab308;
    --green:#22c55e;
    --violet:#7c3aed;
    --shadow:0 18px 50px rgba(15,23,42,.18)}


*{
    box-sizing:border-box}

body{
    margin:0;
    font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
    background:linear-gradient(135deg,#eaf3ff,#fbfdff);
    color:var(--ink)}

button,input,select,textarea{
    font:inherit}

.wrap{
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:20px 10px}

.phone{
    width:min(430px,100%,44vh);
    aspect-ratio:430/900;
    height:auto;
    background:#111;
    border-radius:42px;
    padding:12px;
    box-shadow:var(--shadow)}

.screen{
    height:100%;
    border-radius:32px;
    background:var(--bg);
    overflow:hidden;
    position:relative}

/* 상단 파란 프레임: 기존 132px 기준 약 30% 축소 */
.top{
    height:92px;
    background:linear-gradient(135deg,#073b86,#0d63ce);
    color:#fff;
    padding:12px 18px 10px;
    position:relative}

.pill{
    position:absolute;
    left:50%;
    top:12px;
    transform:translateX(-50%);
    width:116px;
    height:27px;
    background:#06152c;
    border-radius:999px}

.status{
    display:flex;
    justify-content:space-between;
    font-size:13px;
    font-weight:800;
    margin-bottom:9px}

.brand{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:12px}

.brandLeft{
    display:flex;
    align-items:center;
    gap:12px}

.shield{
    width:42px;
    height:42px;
    border-radius:15px;
    background:linear-gradient(145deg,#dff6ff,#60a5fa);
    display:grid;
    place-items:center;
    font-size:24px}

.shield img{
    width:32px;
    height:32px;
    object-fit:contain;
    display:block}

.brand h1{
    margin:0;
    font-size:18px}

.brand p{
    margin:3px 0 0;
    font-size:12px;
    opacity:.85}

/* 로그인 버튼 (헤더 우측) */
.loginBtn{
    flex:0 0 auto;
    display:flex;
    align-items:center;
    gap:4px;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.55);
    color:#fff;
    font-size:10px;
    font-weight:900;
    padding:6px 9px;
    border-radius:999px;
    cursor:pointer;
    white-space:nowrap;
    backdrop-filter:blur(2px);
    transition:background .15s ease}

#loginIcon{
    font-size:13px;
    line-height:1}

#loginIcon i{
    font-size:13px;
    line-height:1}

.loginBtn:active{
    transform:translateY(1px)}

.loginBtn:hover{
    background:rgba(255,255,255,.28)}

.loginBtn.isAdmin{
    background:var(--green);
    color:#fff;
    border-color:var(--green)}

.content{
    height:calc(100% - 92px - 84px);
    overflow:auto;
    padding:6px 16px 12px;
    scrollbar-width:none}

/* 메시지 표시 영역: 현재 42px 기준 30% 추가 축소 → 29px */
.banner{
    background:#eef6ff;
    border:1px solid #bfdbfe;
    border-radius:16px;
    padding:4px 10px;
    font-size:12px;
    color:#1e3a8a;
    font-weight:850;
    line-height:1.45;
    margin-bottom:8px}

.messageBox{
    width:100%;
    min-height:29px;
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12px;
    font-weight:900;
    line-height:1.25}

.messageIcon{
    flex:0 0 auto;
    font-size:14px}

.messageText{
    flex:1;
    word-break:keep-all}

.grid{
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:9px;
    margin:12px 0}

.quick{
    background:#fff;
    border:1px solid var(--line);
    border-radius:17px;
    padding:14px 6px;
    box-shadow:0 6px 18px rgba(15,23,42,.06);
    text-align:center;
    cursor:pointer;
    text-decoration:none;
    color:var(--ink);
    position:relative;
    transition:opacity .15s ease}

.quick.locked{
    opacity:.55}

.quick .ico{
    font-size:27px}

.quick b{
    display:block;
    font-size:12px;
    margin-top:6px}

.title{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin:14px 0 9px;
    font-weight:950}

.title small{
    color:var(--muted);
    font-weight:800}

.summary{
    display:grid;
    grid-template-columns:repeat(4,1fr);
    gap:8px}

.stat{
    background:#fff;
    border:1px solid var(--line);
    border-radius:13px;
    text-align:center;
    padding:11px 4px}

.stat small{
    display:block;
    color:var(--muted);
    font-size:11px;
    font-weight:850}

.stat strong{
    font-size:20px}

.stat strong.placeholder{
    font-size:12px;
    color:var(--muted);
    font-weight:800}

.summaryPlaceholder{
    background:#fff9db;
    border:1px solid #fde68a;
    border-radius:18px;
    min-height:120px;
    margin:9px 0}

.noteCard{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    margin:9px 0;
    box-shadow:0 8px 19px rgba(15,23,42,.06);
    position:relative;
    transition:opacity .15s ease}

.noteCard.locked{
    opacity:.6}

.noteNav{
    display:flex;
    align-items:center;
    justify-content:space-between;
    margin-bottom:9px}

.noteNavBtn{
    border:1px solid #dbe4f0;
    background:#f8fafc;
    color:#334155;
    font-size:11px;
    font-weight:850;
    padding:6px 10px;
    border-radius:999px;
    cursor:pointer}

.noteNavBtn:disabled{
    opacity:.4;
    cursor:default}

.noteDateWrap{
    position:relative;
    display:inline-block;
    cursor:pointer}

.noteDateInput{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    opacity:0;
    border:0;
    background:transparent;
    cursor:pointer}

.noteDateLabel{
    font-size:13px;
    font-weight:950;
    color:#0b4ea2}

.noteBody{
    min-height:70px}

.noteView{
    font-size:13px;
    line-height:1.6;
    color:#334155;
    white-space:pre-wrap;
    word-break:keep-all;
    min-height:70px}

.noteView.empty{
    color:#94a3b8}

.noteEdit{
    width:100%;
    min-height:70px;
    border:1px solid #dbe4f0;
    border-radius:12px;
    padding:10px;
    font-size:13px;
    line-height:1.6;
    resize:vertical}

.noteActions{
    display:flex;
    gap:8px;
    margin-top:10px}

.noteActions .btn{
    flex:1;
    padding:10px}

.insightCard{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    padding:12px;
    margin:9px 0;
    position:relative;
    box-shadow:0 8px 19px rgba(15,23,42,.06)}

.mockBadge{
    position:absolute;
    top:10px;
    right:10px;
    background:var(--violet);
    color:#fff;
    font-size:10px;
    font-weight:950;
    padding:3px 8px;
    border-radius:999px}

.insightSection{
    background:#f8fafc;
    border:1px solid #eef1f6;
    border-radius:13px;
    padding:10px 11px;
    margin-bottom:8px}

.insightSection:last-child{
    margin-bottom:0}

.insightSection h5{
    margin:0 0 6px;
    font-size:12px;
    font-weight:950;
    color:#0b4ea2;
    display:flex;
    align-items:center;
    gap:5px}

.insightSection h5 .num{
    display:inline-flex;
    align-items:center;
    justify-content:center;
    width:16px;
    height:16px;
    border-radius:50%;
    background:var(--blue2);
    color:#fff;
    font-size:9px;
    font-weight:950}

.insightSection p{
    margin:0;
    font-size:12px;
    color:#475569;
    line-height:1.55}

.insightSection .quote{
    font-size:12px;
    color:#334155;
    line-height:1.6;
    background:#fff;
    border-left:3px solid #93c5fd;
    padding:6px 9px;
    border-radius:6px}

.insightChips{
    display:flex;
    gap:5px;
    flex-wrap:wrap}

.insightChip{
    font-size:11px;
    font-weight:850;
    padding:4px 8px;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8}

.timeline{
    display:flex;
    gap:6px;
    overflow-x:auto;
    padding-bottom:2px}

.timeline .tstep{
    flex:0 0 auto;
    text-align:center;
    font-size:10px;
    color:#64748b}

.timeline .tstep .dot{
    width:9px;
    height:9px;
    border-radius:50%;
    background:var(--blue2);
    margin:0 auto 4px}

.timeline .tstep b{
    display:block;
    font-size:10px;
    color:#334155;
    margin-top:2px;
    white-space:nowrap}

.checkline{
    display:flex;
    align-items:center;
    justify-content:space-between;
    font-size:12px;
    padding:5px 0;
    border-bottom:1px dashed #e2e8f0}

.checkline:last-child{
    border-bottom:0}

.checkline .found{
    color:#16a34a;
    font-weight:900}

.checkline .missing{
    color:#94a3b8;
    font-weight:800}

.miniStats{
    display:flex;
    gap:8px}

.miniStats div{
    flex:1;
    background:#fff;
    border:1px solid #eef1f6;
    border-radius:10px;
    text-align:center;
    padding:8px 4px}

.miniStats small{
    display:block;
    font-size:10px;
    color:#64748b;
    font-weight:800}

.miniStats strong{
    font-size:15px;
    color:#0b4ea2}

.pendingNote{
    font-size:11px;
    color:#b45309;
    background:#fffbeb;
    border:1px dashed #fcd34d;
    border-radius:8px;
    padding:7px 9px;
    line-height:1.5}

.card,.form{
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    box-shadow:0 8px 19px rgba(15,23,42,.06);
    padding:12px;
    margin:9px 0}

.card h4{
    margin:0 0 8px;
    font-size:14px}

.card p{
    font-size:13px;
    color:#475569;
    line-height:1.55;
    margin:5px 0}

.badge{
    display:inline-flex;
    align-items:center;
    padding:4px 8px;
    border-radius:999px;
    color:#fff;
    font-size:11px;
    font-weight:950}

.g1,.s{
    background:var(--red)}

.g2,.a{
    background:var(--orange)}

.g3,.b{
    background:var(--yellow);
    color:#713f12}

.g4,.c{
    background:var(--green)}

.ai{
    background:var(--violet)}

.row{
    margin-bottom:8px}

.row label{
    display:block;
    font-size:12px;
    font-weight:950;
    color:#334155;
    margin-bottom:5px}

.row input,.row select,.row textarea{
    width:100%;
    border:1px solid #dbe4f0;
    border-radius:12px;
    padding:11px;
    background:#fff;
    font-size:13px}

.btn{
    width:100%;
    border:0;
    border-radius:14px;
    background:#1565d8;
    color:#fff;
    font-weight:950;
    padding:12px;
    cursor:pointer;
    text-align:center;
    text-decoration:none;
    display:block}

.btn.aiBtn{
    background:linear-gradient(135deg,#7c3aed,#2563eb)}

.btn.gray{
    background:#f1f5f9;
    color:#0f172a;
    border:1px solid #dbe4f0}

.meta{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:6px}

.meta div{
    background:#f8fafc;
    border-radius:10px;
    padding:7px;
    font-size:11px}

.meta b{
    display:block;
    color:#475569;
    margin-bottom:2px}

.chips{
    display:flex;
    gap:5px;
    flex-wrap:wrap;
    margin-top:8px}

.chip{
    font-size:11px;
    font-weight:850;
    padding:5px 8px;
    border-radius:999px;
    background:#eff6ff;
    color:#1d4ed8}

.noteBox{
    background:#fff8e1;
    border:1px solid #fde68a;
    border-radius:14px;
    padding:4px 10px;
    font-size:12px;
    line-height:1.5;
    color:#713f12;
    margin-top:8px}

.photos{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:8px;
    margin-top:8px}

.photoBox{
    background:#f8fafc;
    border:1px solid #dbe4f0;
    border-radius:14px;
    padding:7px;
    cursor:pointer}

.photoBox small{
    display:block;
    font-size:11px;
    font-weight:900;
    color:#475569;
    margin-bottom:5px}

.photoFrame{
    height:78px;
    border-radius:11px;
    border:1px solid #d1d5db;
    display:grid;
    place-items:center;
    position:relative;
    overflow:hidden;
    background:linear-gradient(145deg,#f8fafc,#dbeafe)}

.photoFrame:before{
    content:"📷";
    font-size:28px}

.photoFrame span{
    position:absolute;
    right:6px;
    bottom:5px;
    background:rgba(15,23,42,.72);
    color:#fff;
    border-radius:999px;
    padding:3px 6px;
    font-size:10px;
    font-weight:900}

.scorebar{
    height:8px;
    background:#ede9fe;
    border-radius:999px;
    overflow:hidden;
    margin:7px 0}

.scorebar i{
    display:block;
    height:100%;
    background:linear-gradient(90deg,#7c3aed,#2563eb)}

.chart{
    display:flex;
    align-items:end;
    gap:8px;
    height:140px;
    background:#fff;
    border:1px solid var(--line);
    border-radius:18px;
    padding:18px 10px 28px;
    margin:9px 0;
    position:relative}

.bar{
    flex:1;
    border-radius:9px 9px 2px 2px;
    background:#60a5fa;
    position:relative;
    min-height:8px}

.bar span{
    position:absolute;
    bottom:-22px;
    left:50%;
    transform:translateX(-50%);
    font-size:10px;
    font-weight:900;
    color:#475569}

.bar em{
    position:absolute;
    bottom:100%;
    left:50%;
    transform:translateX(-50%);
    font-style:normal;
    font-size:10px;
    font-weight:900;
    color:#1e3a8a}

.tabs{
    position:absolute;
    left:0;
    right:0;
    bottom:0;
    height:84px;
    background:#fff;
    border-top:1px solid #e5e7eb;
    display:grid;
    grid-template-columns:repeat(5,1fr);
    padding:8px}

.tab{
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    gap:2px;
    color:#64748b;
    font-size:11px;
    font-weight:850;
    cursor:pointer;
    text-decoration:none;
    position:relative;
    transition:opacity .15s ease}

.tab.locked{
    opacity:.5}

.tab.active{
    color:#0b4ea2}

.plus{
    margin-top:-25px;
    width:58px;
    height:58px;
    border-radius:50%;
    background:#0b4ea2;
    color:#fff;
    border:5px solid #fff;
    display:grid;
    place-items:center;
    font-size:35px}

.input{
    position:static;
    padding:8px 0 0;
    margin-top:8px;
    background:none}

.inputbar{
    display:flex;
    gap:8px;
    align-items:center;
    background:#fff;
    border:1px solid #e2e8f0;
    border-radius:18px;
    padding:9px 10px}

.inputbar input{
    border:0;
    outline:0;
    flex:1;
    font-size:13px}

.send{
    width:38px;
    height:38px;
    border:0;
    border-radius:50%;
    background:#1565d8;
    color:#fff;
    font-size:17px}

/* ===== 관리자 로그인 모달 ===== */
.modalOverlay{
    position:fixed;
    inset:0;
    background:rgba(15,23,42,.55);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:999;
    padding:20px}

.modalOverlay.open{
    display:flex}

.loginModal{
    width:100%;
    max-width:320px;
    background:#fff;
    border-radius:22px;
    padding:22px 20px 20px;
    box-shadow:0 24px 60px rgba(15,23,42,.35);
    position:relative}

.loginModal h3{
    margin:0 0 4px;
    font-size:17px;
    color:var(--blue)}

.loginModal p.sub{
    margin:0 0 16px;
    font-size:12px;
    color:var(--muted)}

.modalClose{
    position:absolute;
    right:14px;
    top:14px;
    width:28px;
    height:28px;
    border:0;
    background:#f1f5f9;
    border-radius:50%;
    color:#475569;
    font-size:15px;
    cursor:pointer}

.loginModal .row{
    margin-bottom:10px}

.loginModal .row label{
    font-size:11px;
    color:#334155;
    font-weight:900;
    margin-bottom:4px}

.loginModal .row input{
    border:1px solid #dbe4f0;
    border-radius:11px;
    padding:11px;
    width:100%;
    font-size:13px}

.loginModal .errorMsg{
    display:none;
    background:#fef2f2;
    border:1px solid #fecaca;
    color:#b91c1c;
    font-size:11px;
    font-weight:800;
    border-radius:10px;
    padding:7px 9px;
    margin-bottom:10px}

.loginModal .errorMsg.show{
    display:block}

.loginModal .btnRow{
    display:flex;
    gap:8px;
    margin-top:14px}

.loginModal .btnRow .btn{
    padding:11px}

.loginModal .btnRow .cancelBtn{
    background:#f1f5f9;
    color:#0f172a}

.loginModal .noteMini{
    margin-top:12px;
    font-size:10px;
    color:#94a3b8;
    line-height:1.5;
    text-align:center}
  </style>
 </head>
 <body>
  <div class="wrap">
   <main class="phone">
    <div class="screen">
     <header class="top">
      <div class="pill">
      </div>
      <div class="status">
       <span>
        9:41
       </span>
       <span>
        ●●● 5G 🔋
       </span>
      </div>
      <div class="brand">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ===== Supabase 연결 설정 =====
    const SUPABASE_URL = "https://fafdxaifluftnertbpvr.supabase.co";
    const SUPABASE_ANON_KEY = "sb_publishable_RNEAVQD2wZRtZojxVU11aA_Dacmf7db";
    let sb = null;
    try {
      if (!window.supabase) throw new Error("Supabase 라이브러리를 불러오지 못했습니다.");
      sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
        auth: {
          storage: window.sessionStorage, // 브라우저 창을 닫으면 세션 자동 종료
          persistSession: true,
          autoRefreshToken: true
        }
      });
    } catch (err) {
      console.error("Supabase 초기화 실패:", err);
    }

    let currentSession = null;

    function isLoggedIn() {
      return !!currentSession;
    }

    // ===== 관리자 로그인 모달 제어 (실제 Supabase Auth 연동) =====
    const loginOverlay = document.getElementById('loginModalOverlay');
    const loginTrigger = document.getElementById('loginTrigger');
    const loginIcon = document.getElementById('loginIcon');
    const loginLabel = document.getElementById('loginLabel');
    const loginError = document.getElementById('loginError');

    async function openLoginModal(){
      if (isLoggedIn()) {
        if (confirm('로그아웃 하시겠습니까?')) {
          if (sb) await sb.auth.signOut();
          currentSession = null;
          updateLoginButton();
        }
        return;
      }
      loginError.classList.remove('show');
      document.getElementById('loginId').value = '';
      document.getElementById('loginPw').value = '';
      loginOverlay.classList.add('open');
    }

    function closeLoginModal(){
      loginOverlay.classList.remove('open');
    }

    function showLoginError(message){
      loginError.textContent = message;
      loginError.classList.add('show');
    }

    async function submitLogin(){
      const id = document.getElementById('loginId').value.trim();
      const pw = document.getElementById('loginPw').value.trim();

      if (!id || !pw) {
        showLoginError('이메일과 비밀번호를 모두 입력해주세요.');
        return;
      }

      if (!sb) {
        showLoginError('로그인 서버 연결에 실패했습니다. 인터넷 연결을 확인해주세요.');
        return;
      }

      const loginBtnEl = document.querySelector('.loginModal .btnRow .btn:not(.cancelBtn)');
      if (loginBtnEl) { loginBtnEl.disabled = true; loginBtnEl.textContent = '확인 중...'; }

      const { data, error } = await sb.auth.signInWithPassword({ email: id, password: pw });

      if (loginBtnEl) { loginBtnEl.disabled = false; loginBtnEl.textContent = '로그인'; }

      if (error) {
        showLoginError('이메일 또는 비밀번호가 올바르지 않습니다.');
        return;
      }

      currentSession = data.session;
      updateLoginButton();
      closeLoginModal();
    }

    function updateLoginButton(){
      if (isLoggedIn()) {
        loginTrigger.classList.add('isAdmin');
        loginIcon.innerHTML = '<i class="ti ti-lock-open" aria-hidden="true"></i>';
        loginLabel.textContent = '관리자';
      } else {
        loginTrigger.classList.remove('isAdmin');
        loginIcon.innerHTML = '<i class="ti ti-lock" aria-hidden="true"></i>';
        loginLabel.textContent = '로그인';
      }
      updateMenuLockState();
      updateSummaryCard();
    }

    // ===== 메뉴 잠금 처리: 로그인 전에는 모든 메뉴(홈 포함) 기능 정지 =====
    // 시각적 흐림 효과는 적용하지 않는다. (요청에 따라 opacity 클래스 미사용)
    function updateMenuLockState(){
      // 현재 디자인 유지: 잠금 상태의 시각적 표시 없음.
      // 실제 이동 차단은 아래 클릭 인터셉트 로직에서 처리한다.
    }

    // 로그인 전에는 data-requires-login 요소를 클릭해도 아무 동작도 하지 않는다.
    // (페이지 이동 없음, 팝업/모달도 뜨지 않음 - 오직 헤더의 로그인 버튼만 동작)
    document.addEventListener('click', function(e){
      const link = e.target.closest('[data-requires-login]');
      if (!link) return;
      if (!isLoggedIn()) {
        e.preventDefault();
        // 의도적으로 아무 반응 없음 (로그인 모달 호출하지 않음)
      }
    }, true);

    // 모달 바깥 클릭 시 닫기
    loginOverlay.addEventListener('click', (e) => {
      if (e.target === loginOverlay) closeLoginModal();
    });

    // ===== 오늘 요약 카드: 당월전체 / 당월실적 / 오늘건수 / 당월잔존 =====
    // 모든 판단은 한국시간(KST, UTC+9) 기준으로 계산한다.
    //
    // [정의] 한 행(row) 안의 접수/실시/예약을 각각 1건으로 세는 "이벤트 기반" 집계.
    //  · 접수 = received_at 가 당월
    //  · 실시 = Consultation_start_time 가 당월
    //  · 예약 = next_reservation_at 가 당월 (아직 남은 차기 예약)
    //  - 당월전체 : 접수 + 실시 + 예약
    //  - 당월실적 : 접수 + 실시   (이미 완료된 활동)
    //  - 오늘건수 : 실시 중 실시일이 오늘인 건수
    //  - 당월잔존 : 예약          (= 당월전체 - 당월실적)
    const KST_OFFSET_MS = 9 * 60 * 60 * 1000;

    // DB의 timestamptz(UTC) 문자열 → KST로 보정된 Date 객체로 변환
    function toKstDate(utcString){
      if (!utcString) return null;
      const utcMs = new Date(utcString).getTime();
      if (Number.isNaN(utcMs)) return null;
      return new Date(utcMs + KST_OFFSET_MS);
    }

    // KST 기준 "YYYY-MM-DD" 날짜키 추출 (getUTC* 사용: 이미 +9시간 보정된 값이므로)
    function kstDateKey(kstDate){
      const y = kstDate.getUTCFullYear();
      const m = String(kstDate.getUTCMonth() + 1).padStart(2, '0');
      const d = String(kstDate.getUTCDate()).padStart(2, '0');
      return `${y}-${m}-${d}`;
    }

    function kstYearMonthKey(kstDate){
      const y = kstDate.getUTCFullYear();
      const m = String(kstDate.getUTCMonth() + 1).padStart(2, '0');
      return `${y}-${m}`;
    }

    async function updateSummaryCard(){
      const elTotal = document.getElementById('statTotal');
      const elDone = document.getElementById('statDone');
      const elToday = document.getElementById('statToday');
      const elRemain = document.getElementById('statRemain');
      const elDateLabel = document.getElementById('summaryDateLabel');

      // 로그인 전: RLS 정책상 select가 막혀 있으므로 안내만 표시
      if (!isLoggedIn()) {
        [elTotal, elDone, elToday, elRemain].forEach(el => {
          el.textContent = '🔒';
          el.classList.add('placeholder');
        });
        if (elDateLabel) elDateLabel.textContent = '';
        return;
      }

      [elTotal, elDone, elToday, elRemain].forEach(el => el.classList.remove('placeholder'));

      if (!sb) {
        [elTotal, elDone, elToday, elRemain].forEach(el => { el.textContent = '오류'; });
        return;
      }

      try {
        const { data, error } = await sb
          .from('db_sina_counsel')
          .select('received_at, Consultation_start_time, next_reservation_at');

        if (error) throw error;

        const nowKst = toKstDate(new Date().toISOString());
        const thisMonthKey = kstYearMonthKey(nowKst);
        const todayKey = kstDateKey(nowKst);

        // ---- 이벤트 기반 집계 (한 행 안의 접수/실시/예약을 각각 1건으로 카운트) ----
        //  접수  : received_at 가 당월(KST)
        //  실시  : Consultation_start_time 가 당월(KST)
        //  예약  : next_reservation_at 가 당월(KST)  → 아직 남은 차기 예약
        let reception = 0;   // 접수 건수 (당월)
        let session = 0;     // 실시 건수 (당월)
        let reservation = 0; // 예약(차기) 건수 (당월)
        let today = 0;       // 오늘건수: 실시일이 오늘인 건수

        (data || []).forEach(row => {
          // 접수: 접수일(received_at)이 당월이면 +1
          const recKst = toKstDate(row.received_at);
          if (recKst && kstYearMonthKey(recKst) === thisMonthKey) {
            reception += 1;
          }

          // 실시: 상담 시작일(Consultation_start_time)이 당월이면 +1
          const startKst = toKstDate(row.Consultation_start_time);
          if (startKst && kstYearMonthKey(startKst) === thisMonthKey) {
            session += 1;
            // 오늘건수: 실시일이 오늘인 경우
            if (kstDateKey(startKst) === todayKey) {
              today += 1;
            }
          }

          // 예약: 차기 예약일(next_reservation_at)이 당월이면 +1
          const nextKst = toKstDate(row.next_reservation_at);
          if (nextKst && kstYearMonthKey(nextKst) === thisMonthKey) {
            reservation += 1;
          }
        });

        // 당월전체 = 접수 + 실시 + 예약
        const total = reception + session + reservation;
        // 당월실적 = 접수 + 실시 (이미 완료된 활동)
        const done = reception + session;
        // 당월잔존 = 예약 (앞으로 해야 할 차기 예약)
        const remain = reservation;

        elTotal.textContent = total;
        elDone.textContent = done;
        elToday.textContent = today;
        elRemain.textContent = remain;
        if (elDateLabel) {
          elDateLabel.textContent = `${thisMonthKey} 기준 (KST)`;
        }
      } catch (err) {
        console.error('오늘 요약 데이터 조회 실패:', err);
        [elTotal, elDone, elToday, elRemain].forEach(el => { el.textContent = '오류'; });
      }
    }

    // ===== 상담자 노트 (날짜별 자유메모) =====
    let noteCurrentDate = null;      // 현재 화면에 표시 중인 날짜의 KST Date 객체
    let noteEditing = false;
    let noteLoadedContent = '';      // 서버에서 불러온 원본 내용(취소 시 복원용)

    const WEEKDAY_KO = ['일','월','화','수','목','금','토'];

    function noteFormatLabel(kstDate){
      const key = kstDateKey(kstDate);
      const todayKey = kstDateKey(toKstDate(new Date().toISOString()));
      const weekday = WEEKDAY_KO[kstDate.getUTCDay()]; // KST 보정된 값이라 getUTCDay 사용
      const withWeekday = `${key} (${weekday})`;
      return key === todayKey ? `오늘 ${withWeekday}` : withWeekday;
    }

    function noteRenderNav(){
      const label = document.getElementById('noteDateLabel');
      const nextBtn = document.getElementById('noteNextBtn');
      const dateInput = document.getElementById('noteDateInput');
      if (label) label.textContent = noteFormatLabel(noteCurrentDate);
      const todayKey = kstDateKey(toKstDate(new Date().toISOString()));
      const curKey = kstDateKey(noteCurrentDate);
      if (nextBtn) nextBtn.disabled = (curKey === todayKey);
      if (dateInput) {
        dateInput.value = curKey;
        dateInput.max = todayKey;
      }
    }

    function notePickDate(dateStr){
      if (!isLoggedIn()) return; // 로그인 전에는 날짜 이동 기능 무반응
      const dateInput = document.getElementById('noteDateInput');
      if (noteEditing) {
        if (!confirm('작성 중인 내용이 저장되지 않습니다. 이동할까요?')) {
          if (dateInput) dateInput.value = kstDateKey(noteCurrentDate); // 선택 취소, 원래 값으로 복원
          return;
        }
      }
      const candidate = new Date(dateStr + 'T00:00:00Z'); // 선택된 날짜를 KST 달력 날짜로 취급
      const todayKey = kstDateKey(toKstDate(new Date().toISOString()));
      if (kstDateKey(candidate) > todayKey) {
        alert('미래 날짜는 선택할 수 없습니다.');
        if (dateInput) dateInput.value = kstDateKey(noteCurrentDate);
        return;
      }
      noteCurrentDate = candidate;
      noteLoad();
    }

    document.getElementById('noteDateInput').addEventListener('change', (e) => {
      if (e.target.value) notePickDate(e.target.value);
    });

    async function noteLoad(){
      const viewEl = document.getElementById('noteView');
      const editEl = document.getElementById('noteEdit');
      const cardEl = document.getElementById('noteCard');
      noteRenderNav();

      if (!isLoggedIn()) {
        if (cardEl) cardEl.classList.add('locked');
        viewEl.textContent = '로그인 후 확인 가능합니다.';
        viewEl.classList.add('empty');
        return;
      }
      if (cardEl) cardEl.classList.remove('locked');
      if (!sb) {
        viewEl.textContent = '오류: 서버 연결 실패';
        return;
      }

      const dateKey = kstDateKey(noteCurrentDate);
      viewEl.textContent = '불러오는 중...';
      viewEl.classList.add('empty');

      try {
        const { data, error } = await sb
          .from('counselor_note')
          .select('content')
          .eq('note_date', dateKey)
          .maybeSingle();

        if (error) throw error;

        noteLoadedContent = (data && data.content) ? data.content : '';
        noteExitEdit(); // 읽기 모드로 표시
      } catch (err) {
        console.error('상담자 노트 조회 실패:', err);
        viewEl.textContent = '노트를 불러오지 못했습니다.';
        viewEl.classList.add('empty');
      }
    }

    function noteExitEdit(){
      noteEditing = false;
      const viewEl = document.getElementById('noteView');
      const editEl = document.getElementById('noteEdit');
      const editBtn = document.getElementById('noteEditBtn');
      const saveBtn = document.getElementById('noteSaveBtn');

      editEl.style.display = 'none';
      viewEl.style.display = 'block';
      editBtn.style.display = 'inline-block';
      saveBtn.style.display = 'none';

      if (noteLoadedContent && noteLoadedContent.trim()) {
        viewEl.textContent = noteLoadedContent;
        viewEl.classList.remove('empty');
      } else {
        viewEl.textContent = '작성된 노트가 없습니다.';
        viewEl.classList.add('empty');
      }
    }

    function noteStartEdit(){
      // 로그인 전에는 아무 반응 없음 (로그인 모달을 띄우지 않음)
      if (!isLoggedIn()) { return; }
      noteEditing = true;
      const viewEl = document.getElementById('noteView');
      const editEl = document.getElementById('noteEdit');
      const editBtn = document.getElementById('noteEditBtn');
      const saveBtn = document.getElementById('noteSaveBtn');

      editEl.value = noteLoadedContent || '';
      viewEl.style.display = 'none';
      editEl.style.display = 'block';
      editBtn.style.display = 'none';
      saveBtn.style.display = 'inline-block';
      editEl.focus();
    }

    async function noteSave(){
      // 로그인 전에는 아무 반응 없음 (로그인 모달을 띄우지 않음)
      if (!isLoggedIn() || !sb) { return; }
      const editEl = document.getElementById('noteEdit');
      const saveBtn = document.getElementById('noteSaveBtn');
      const dateKey = kstDateKey(noteCurrentDate);
      const content = editEl.value;

      saveBtn.disabled = true;
      saveBtn.textContent = '저장 중...';

      try {
        const { error } = await sb
          .from('counselor_note')
          .upsert({ note_date: dateKey, content, updated_at: new Date().toISOString() }, { onConflict: 'note_date' });

        if (error) throw error;

        noteLoadedContent = content;
        noteExitEdit();
      } catch (err) {
        console.error('상담자 노트 저장 실패:', err);
        alert('저장에 실패했습니다. 잠시 후 다시 시도해주세요.');
      } finally {
        saveBtn.disabled = false;
        saveBtn.textContent = '저장';
      }
    }

    function noteChangeDay(delta){
      if (!isLoggedIn()) return; // 로그인 전에는 이전/다음 버튼 무반응
      if (noteEditing) {
        if (!confirm('작성 중인 내용이 저장되지 않습니다. 이동할까요?')) return;
      }
      const ms = noteCurrentDate.getTime() + delta * 24 * 60 * 60 * 1000;
      const candidate = new Date(ms);
      const todayKey = kstDateKey(toKstDate(new Date().toISOString()));
      if (kstDateKey(candidate) > todayKey) return; // 미래 이동 방지
      noteCurrentDate = candidate;
      noteLoad();
    }

    function initNote(){
      noteCurrentDate = toKstDate(new Date().toISOString());
      noteLoad();
    }

    // ===== 로그인 상태 초기화 및 실시간 반영 =====
    async function initAuth(){
      if (!sb) { updateLoginButton(); initNote(); return; }
      const { data } = await sb.auth.getSession();
      currentSession = data.session;
      updateLoginButton();
      initNote();

      sb.auth.onAuthStateChange((_event, session) => {
        currentSession = session;
        updateLoginButton();
        noteLoad();
      });
    }

    initAuth();
  </script>
 </body>
</html>
